<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Channel Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Telegram Fonts & CSS (required for proper styling) -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <style>
    /* Custom overrides - keep Telegram classes */
    .tgme_page_wrap {
      padding: max(10px, env(safe-area-inset-top)) 14px max(80px, calc(env(safe-area-inset-bottom) + 80px));
    }
    .tgme_page {
      max-width: 560px;
      margin: 0 auto;
    }

    /* Custom button styling matching Telegram */
    .custom-action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
      cursor: pointer;
      border: none;
      font-family: inherit;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      width: 100%;
      margin-top: 12px;
    }
    .custom-action-btn:active { opacity: 0.7; transform: scale(0.98); }
    .custom-action-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .custom-action-btn.hidden { display: none; }

    /* Hero card container */
    .verification-hero {
      text-align: center;
      padding: 28px 20px;
    }
    .verification-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      border-radius: 20px;
      background: rgba(36, 129, 204, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .verification-icon svg {
      width: 48px;
      height: 48px;
    }
    .verification-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--tg-theme-text-color, #000000);
      margin-bottom: 6px;
    }
    .verification-subtitle {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    /* Channel list container */
    .channel-list-container {
      padding: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .channel-list-container::-webkit-scrollbar {
      width: 4px;
    }
    .channel-list-container::-webkit-scrollbar-track {
      background: var(--tg-theme-section-separator-color, rgba(0,0,0,0.1));
      border-radius: 4px;
    }
    .channel-list-container::-webkit-scrollbar-thumb {
      background: var(--tg-theme-button-color, #2481cc);
      border-radius: 4px;
    }

    /* Channel item */
    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--tg-theme-section-separator-color, rgba(0,0,0,0.1));
    }
    .channel-item:last-child {
      border-bottom: none;
    }
    .channel-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--tg-theme-button-color, #2481cc);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .channel-avatar svg {
      width: 26px;
      height: 26px;
    }
    .channel-info {
      flex: 1;
    }
    .channel-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000000);
      margin-bottom: 4px;
    }
    .channel-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .channel-status.joined {
      background: #86efac;
      color: #052e16;
    }
    .channel-status.pending {
      background: #fecaca;
      color: #7f1a1a;
    }
    .channel-action-btn {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 30px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.15s;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .channel-action-btn:active { opacity: 0.7; transform: scale(0.97); }
    .channel-action-btn:disabled { opacity: 0.5; cursor: default; transform: none; }
    .channel-action-btn.joined-btn {
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .btn-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status message */
    .verification-status {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--tg-theme-section-separator-color, rgba(0,0,0,0.1));
    }
    .verification-status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .verification-status.ok { color: #22c55e; }
    .verification-status.ok::before { background: #22c55e; }
    .verification-status.error { color: #ef4444; }
    .verification-status.error::before { background: #ef4444; }

    /* Toast notification */
    .custom-toast {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      text-align: center;
    }
    .custom-toast.show { opacity: 1; transform: translateY(0); }
    .custom-toast.success { background: #22c55e; }
    .custom-toast.error { background: #ef4444; }
  </style>
</head>

  <!-- Telegram Wallpaper Script -->
  <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>

  <script>
    // Initialize Telegram Wallpaper (EXACT from source)
    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg && window.TWallpaper) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }
    document.body.classList.remove('no_transition');

    // Dark mode support
    function toggleTheme(dark) {
      document.documentElement.classList.toggle('theme_dark', dark);
      window.Telegram && Telegram.setWidgetOptions && Telegram.setWidgetOptions({dark: dark});
    }
    if (window.matchMedia) {
      var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
      toggleTheme(darkMedia.matches);
      darkMedia.addListener(function(e) { toggleTheme(e.matches); });
    }

    // ── WebApp Logic ─────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const listEl = document.getElementById('channel-list');
    const toastEl = document.getElementById('toast');
    const actionBtn = document.getElementById('actionButton');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    let toastTimer;
    function showNotification(message, type, duration = 2500) {
      toastEl.textContent = message;
      toastEl.className = `custom-toast ${type} show`;
      if (tg && type === 'success') tg.HapticFeedback?.notificationOccurred('success');
      if (tg && type === 'error') tg.HapticFeedback?.notificationOccurred('error');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    function setStatus(kind, message) {
      statusEl.className = `verification-status ${kind}`;
      statusEl.textContent = message;
      if (kind === 'ok') subtitleEl.textContent = '✓ All channels verified!';
      else if (kind === 'error') subtitleEl.textContent = '❌ Verification failed';
    }

    function setLoading(loading) {
      if (loading) {
        actionBtn.disabled = true;
        actionBtn.innerHTML = '<span class="btn-spinner"></span> Checking...';
      } else {
        actionBtn.disabled = false;
        actionBtn.innerHTML = 'Re-check';
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function isValidWebhookUrl(url) {
      if (!url) return false;
      try { return new URL(url).protocol === 'https:'; } catch { return false; }
    }

    function renderChannels(channels) {
      listEl.innerHTML = '';
      if (!channels.length) {
        listEl.innerHTML = '<div style="padding:14px;text-align:center;color:var(--tg-theme-hint-color, #8e8e93)">No channels from webhook</div>';
        return;
      }
      channels.forEach((ch, idx) => {
        const title = ch.channel || ch.title || ch.id || `Channel ${idx + 1}`;
        const joined = Boolean(ch.joined);
        const row = document.createElement('div');
        row.className = 'channel-item';
        
        const avatar = document.createElement('div');
        avatar.className = 'channel-avatar';
        avatar.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="avatar_clip"><rect width="512" height="512"></rect></clipPath></defs><g clip-path="url(#avatar_clip)"><path stroke-linecap="round" stroke-linejoin="round" fill-opacity="0" stroke="rgb(255,255,255)" stroke-opacity="1" stroke-width="6" d=" M35.28499984741211,72.25 C35.28499984741211,72.25 72.875,72.25 72.875,72.25 C77.812255859375,72.25 81.875,68.187255859375 81.875,63.25 C81.875,63.25 81.875,30.375 81.875,30.375 C81.875,25.437746047973633 77.812255859375,21.375 72.875,21.375 C72.875,21.375 26.875,21.375 26.875,21.375 C21.937746047973633,21.375 17.875,25.437746047973633 17.875,30.375 C17.875,30.375 17.875,81.83300018310547 17.875,81.83300018310547 C17.875,84.49500274658203 21.084999084472656,85.83799743652344 22.981000900268555,83.96900177001953 C22.981000900268555,83.96900177001953 34.58300018310547,72.53800201416016 34.58300018310547,72.53800201416016 C34.7700080871582,72.35356903076172 35.02234649658203,72.25004577636719 35.28499984741211,72.25 C35.28499984741211,72.25 35.28499984741211,72.25 35.28499984741211,72.25z M34.875,53.625 C34.875,53.625 55.75,53.625 55.75,53.625 M34.875,39.625 C34.875,39.625 66.25,39.625 66.25,39.625"></path></g></svg>`;
        
        const infoDiv = document.createElement('div');
        infoDiv.className = 'channel-info';
        infoDiv.innerHTML = `<div class="channel-name">${escapeHtml(title)}</div><span class="channel-status ${joined ? 'joined' : 'pending'}">${joined ? '✓ Joined' : '✗ Not joined'}</span>`;
        
        row.appendChild(avatar);
        row.appendChild(infoDiv);
        
        if (!joined && ch.link) {
          const btn = document.createElement('button');
          btn.className = 'channel-action-btn';
          btn.innerHTML = 'Join';
          btn.onclick = () => {
            tg?.HapticFeedback?.impactOccurred('light');
            if (tg) tg.openTelegramLink(ch.link);
            else window.open(ch.link, '_blank');
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner"></span> Opening...';
            setTimeout(() => {
              if (!btn.disabled) return;
              btn.innerHTML = 'Join';
              btn.disabled = false;
            }, 3000);
          };
          row.appendChild(btn);
        } else if (joined) {
          const doneBtn = document.createElement('button');
          doneBtn.className = 'channel-action-btn joined-btn';
          doneBtn.disabled = true;
          doneBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Joined';
          row.appendChild(doneBtn);
        }
        listEl.appendChild(row);
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try { return await fetch(url, { ...options, signal: controller.signal }); }
      finally { clearTimeout(timer); }
    }

    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing webhook URL');
        showNotification('Missing ?check= webhook URL', 'error');
        return;
      }
      setLoading(true);
      try {
        setStatus('error', 'Verifying memberships...');
        tg?.HapticFeedback?.impactOccurred('medium');
        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now());
        const resp = await fetchWithTimeout(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg?.initData || null, platform: tg?.platform || null })
        }, 12000);
        const data = await resp.json();
        if (!resp.ok || !data?.ok) throw new Error(data?.error || 'Webhook error');
        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);
        if (data.joined) {
          setStatus('ok', '✅ All channels joined! Closing...');
          showNotification('Verification complete! Closing app...', 'success', 1800);
          tg?.HapticFeedback?.notificationOccurred('success');
          actionBtn.disabled = true;
          actionBtn.innerHTML = 'Verified ✓';
          setTimeout(() => tg?.close(), 1500);
          return;
        }
        setStatus('error', '✗ Join missing channels and tap Re-check');
        showNotification('Please join pending channels and re-check', 'error');
      } catch (err) {
        const isAbort = err?.name === 'AbortError';
        setStatus('error', isAbort ? 'Webhook timeout' : err.message);
        showNotification(isAbort ? 'Request timeout — tap Retry' : err.message, 'error');
      } finally {
        setLoading(false);
      }
    }

    function initApp() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK missing');
        showNotification('Open from Telegram bot', 'error');
        actionBtn.disabled = true;
        return;
      }
      tg.ready();
      tg.expand();
      actionBtn.onclick = runCheck;
      runCheck();
    }

    initApp();
  </script>
