<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>
</head>

<body class="no_transition">

<div class="tgme_background_wrap">
  <canvas id="tgme_background" class="tgme_background default"></canvas>
  <div class="tgme_background_pattern default"></div>
</div>

<div class="tgme_page_wrap">

  <!-- HEADER -->
  <div class="tgme_head_wrap">
    <div class="tgme_head">
      <a href="//telegram.org/" class="tgme_head_brand">
        <svg class="tgme_logo" height="34" viewBox="0 0 133 34" width="133">
          <circle cx="17" cy="17" r="17" fill="var(--accent-btn-color)"/>
        </svg>
      </a>
      <a class="tgme_head_right_btn" href="#">Download</a>
    </div>
  </div>

  <!-- BODY -->
  <div class="tgme_body_wrap">
    <div class="tgme_page">
      <div style="padding: 14px 16px; text-align:center;">

        <!-- MAIN ICON -->
        <div style="width:104px;height:104px;margin:0 auto 16px;border-radius:50%;background:var(--accent-btn-color);display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 512 512" width="60">
            <path fill="#fff" d="M57 58l15 10c3 2 6 0 6-3V25c0-3-4-5-6-3L58 33v25z"/>
          </svg>
        </div>

        <!-- TITLE -->
        <div style="font-size:30px;font-weight:800;color:var(--tme-logo-color);">
          Join Channel Verification
        </div>

        <!-- LINE -->
        <div style="width:100%;max-width:280px;height:1px;margin:14px auto;background:rgba(127,127,127,.22);"></div>

        <!-- CHANNEL LIST -->
        <div style="max-width:340px;margin:0 auto;">

          <!-- ITEM -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0;">
            
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:42px;height:42px;border-radius:50%;background:var(--accent-btn-color);display:flex;align-items:center;justify-content:center;">
                <svg width="20" viewBox="0 0 512 512">
                  <path fill="#fff" d="M57 58l15 10c3 2 6 0 6-3V25c0-3-4-5-6-3L58 33v25z"/>
                </svg>
              </div>
              <div style="font-weight:600;">@ChannelOne</div>
            </div>

            <a class="tgme_head_right_btn" href="#">Join</a>
          </div>

          <!-- ITEM -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0;">
            
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:42px;height:42px;border-radius:50%;background:var(--accent-btn-color);display:flex;align-items:center;justify-content:center;">
                <svg width="20" viewBox="0 0 512 512">
                  <path fill="#fff" d="M57 58l15 10c3 2 6 0 6-3V25c0-3-4-5-6-3L58 33v25z"/>
                </svg>
              </div>
              <div style="font-weight:600;">@ChannelTwo</div>
            </div>

            <a class="tgme_head_right_btn" href="#">Join</a>
          </div>

          <!-- ITEM -->
          <div style="display:flex;align-items:center;justify-content:space-between;margin:14px 0;">
            
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:42px;height:42px;border-radius:50%;background:var(--accent-btn-color);display:flex;align-items:center;justify-content:center;">
                <svg width="20" viewBox="0 0 512 512">
                  <path fill="#fff" d="M57 58l15 10c3 2 6 0 6-3V25c0-3-4-5-6-3L58 33v25z"/>
                </svg>
              </div>
              <div style="font-weight:600;">@ChannelThree</div>
            </div>

            <a class="tgme_head_right_btn" href="#">Join</a>
          </div>

        </div>

      </div>
    </div>
  </div>

</div>

<script src="//telegram.org/js/tgwallpaper.min.js"></script>
<script>
var tme_bg = document.getElementById('tgme_background');
if (tme_bg) {
  TWallpaper.init(tme_bg);
  TWallpaper.animate(true);
}
</script>

</body>
</html>
