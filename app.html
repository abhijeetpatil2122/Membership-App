<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Channels</title>

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Telegram Fonts -->
<link href="https://telegram.org/css/font-roboto.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Roboto, sans-serif;
  background: var(--tg-theme-bg-color, #fff);
  color: var(--tg-theme-text-color, #000);
}

/* Container */
.container {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

/* Title */
.title {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 20px;
}

/* Channel Card */
.channel {
  background: var(--tg-theme-secondary-bg-color, #f5f5f5);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

/* Channel Name */
.channel-name {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 10px;
}

/* Buttons */
.btn {
  display: block;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  margin-top: 6px;
}

.join-btn {
  background: #0088cc;
  color: white;
}

.verify-btn {
  background: #e4e6eb;
}

/* Verify main */
.verify-main {
  margin-top: 20px;
  background: #34c759;
  color: white;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">

  <div class="title">Join Required Channels</div>

  <!-- Channel 1 -->
  <div class="channel">
    <div class="channel-name">@TestChannelOne</div>

    <button class="btn join-btn" onclick="joinChannel('https://t.me/TestChannelOne')">
      Join Channel
    </button>

    <button class="btn verify-btn" onclick="verifySingle(1)">
      Verify
    </button>
  </div>

  <!-- Channel 2 -->
  <div class="channel">
    <div class="channel-name">@TestChannelTwo</div>

    <button class="btn join-btn" onclick="joinChannel('https://t.me/TestChannelTwo')">
      Join Channel
    </button>

    <button class="btn verify-btn" onclick="verifySingle(2)">
      Verify
    </button>
  </div>

  <!-- Final Verify -->
  <button class="btn verify-main" onclick="verifyAll()">
    ✅ Verify All & Continue
  </button>

</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// Open channel
function joinChannel(link) {
  window.open(link, "_blank");
}

// Dummy verify (frontend demo)
let joined = {
  1: false,
  2: false
};

function verifySingle(id) {
  joined[id] = true;

  tg.showAlert("Channel " + id + " verified ✅");
}

// Final verify
function verifyAll() {
  if (joined[1] && joined[2]) {

    tg.showAlert("All channels joined 🎉");

    // Send data to bot
    tg.sendData(JSON.stringify({
      status: "joined"
    }));

  } else {
    tg.showAlert("Join all channels first ❌");
  }
}
</script>

</body>
</html>
