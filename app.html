<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join Check</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: monospace;
  background: #0f172a;
  color: #e5e7eb;
  padding: 20px;
}
.box {
  background: #020617;
  border: 1px solid #334155;
  padding: 10px;
  margin-bottom: 15px;
}
button, a {
  display: block;
  margin: 8px 0;
  padding: 10px;
  border-radius: 6px;
  text-decoration: none;
  border: none;
}
.join { background: #2563eb; color: white; }
.retry { background: #16a34a; color: white; }
</style>

</head>
<body>

<h3>🔍 Join Check Debug</h3>

<div class="box">
<b>Webhook URL</b>
<pre id="url"></pre>
</div>

<div class="box">
<b>Response</b>
<pre id="res"></pre>
</div>

<div id="ui"></div>

<script>
const params = new URLSearchParams(location.search);
const url = params.get("check");

document.getElementById("url").innerText = url;

function load(){

  fetch(url)
    .then(r => r.json())
    .then(res => {

      document.getElementById("res").innerText =
        JSON.stringify(res, null, 2);

      let ui = "";

      if (res.joined) {

        ui += "<h3>✅ Joined</h3>";
        ui += "<button onclick='done()'>Continue</button>";

      } else {

        ui += "<h3>❌ Not Joined</h3>";

        let link = "https://t.me/" + res.channel.replace("@","");

        ui += `<a class="join" href="${link}" target="_blank">Join Channel</a>`;
        ui += "<button class='retry' onclick='load()'>Recheck</button>";
      }

      document.getElementById("ui").innerHTML = ui;
    })
    .catch(err => {
      document.getElementById("res").innerText = err.toString();
    });
}

function done(){
  Telegram.WebApp.close();
}

load();
</script>

</body>
</html>
