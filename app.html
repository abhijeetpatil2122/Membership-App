<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram Fonts & CSS -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Dark mode support -->
  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>

  <style>
    /* Give page room so content doesn't hide under MainButton */
    .tgme_page { padding-bottom: 80px; }

    /* ── Section labels ── */
    .cv-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
      margin: 0 0 4px 2px;
    }
    .cv-subtitle {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #999);
      margin: 0 0 14px 2px;
    }

    /* ── Channel Card ── */
    .cv-card {
      background: var(--tg-theme-bg-color, #fff);
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    /* Card top: avatar + name + badge */
    .cv-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px 12px;
    }
    .cv-card-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--tg-theme-button-color, #3390ec);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cv-card-avatar svg { fill: #fff; width: 22px; height: 22px; }
    .cv-card-meta { flex: 1; min-width: 0; }
    .cv-card-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--tg-theme-text-color, #000);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cv-card-handle {
      font-size: 12px;
      color: var(--tg-theme-hint-color, #999);
      margin-top: 2px;
    }
    .cv-card-badge {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #e8f5e9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0.6);
      transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .cv-card-badge.visible {
      opacity: 1;
      transform: scale(1);
    }
    .cv-card-badge svg { width: 14px; height: 14px; fill: #43a047; }

    /* Divider */
    .cv-card-divider {
      height: 1px;
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      margin: 0 16px;
    }

    /* Card bottom: two equal buttons */
    .cv-card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .cv-btn {
      border: none;
      background: none;
      padding: 13px 0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background .15s, opacity .15s;
      position: relative;
    }
    .cv-btn:active { opacity: .65; }
    .cv-btn:disabled { cursor: default; }

    .cv-btn-join {
      color: var(--tg-theme-button-color, #3390ec);
      border-right: 1px solid var(--tg-theme-secondary-bg-color, #f0f0f0);
    }
    .cv-btn-join.done { color: #43a047; }
    .cv-btn-join:disabled { opacity: .5; }

    .cv-btn-verify {
      color: var(--tg-theme-button-color, #3390ec);
    }
    .cv-btn-verify.done { color: #43a047; }
    .cv-btn-verify:disabled:not(.done) { opacity: .4; }

    /* Spinner */
    .cv-spinner {
      width: 13px;
      height: 13px;
      border: 2px solid rgba(0,0,0,0.12);
      border-top-color: var(--tg-theme-button-color, #3390ec);
      border-radius: 50%;
      animation: cv-spin .65s linear infinite;
    }
    @keyframes cv-spin { to { transform: rotate(360deg); } }

    /* ── Footer note (outside cards) ── */
    .cv-footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #aaa);
      margin-top: 12px;
      padding: 0 10px;
      line-height: 1.6;
    }

    /* ── Toast ── */
    .cv-toast {
      position: fixed;
      bottom: 26px;
      left: 50%;
      transform: translateX(-50%) translateY(64px);
      padding: 10px 22px;
      border-radius: 22px;
      font-size: 13.5px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: transform .32s cubic-bezier(.34,1.56,.64,1), opacity .22s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .cv-toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .cv-toast.success { background: #43a047; }
    .cv-toast.error   { background: #e53935; }
    .cv-toast.info    { background: #1e88e5; }
  </style>
</head>

<body class="no_transition">

  <!-- Background (UNCHANGED) -->
  <div class="tgme_background_wrap">
    <canvas id="tgme_background"
            class="tgme_background default"
            width="50" height="50"
            data-colors="dbddbb,6ba587,d5d88d,88b884">
    </canvas>
    <div class="tgme_background_pattern default"></div>
  </div>

  <div class="tgme_page_wrap">

    <!-- HEADER (UNCHANGED except "Open Bot" link) -->
    <div class="tgme_head_wrap">
      <div class="tgme_head">
        <a href="//telegram.org/" class="tgme_head_brand">

              <path d="m49.4 24v-12.562h-4.224v-2.266h11.198v2.266h-4.268v12.562zm16.094-4.598h-7.172c.066 1.936 1.562 2.772 3.3 2.772 1.254 0 2.134-.198 2.97-.484l.396 1.848c-.924.396-2.2.682-3.74.682-3.476 0-5.522-2.134-5.522-5.412 0-2.97 1.804-5.764 5.236-5.764 3.476 0 4.62 2.86 4.62 5.214 0 .506-.044.902-.088 1.144zm-7.172-1.892h4.708c.022-.99-.418-2.618-2.222-2.618-1.672 0-2.376 1.518-2.486 2.618zm9.538 6.49v-15.62h2.706v15.62zm14.84-4.598h-7.172c.066 1.936 1.562 2.772 3.3 2.772 1.254 0 2.134-.198 2.97-.484l.396 1.848c-.924.396-2.2.682-3.74.682-3.476 0-5.522-2.134-5.522-5.412 0-2.97 1.804-5.764 5.236-5.764 3.476 0 4.62 2.86 4.62 5.214 0 .506-.044.902-.088 1.144zm-7.172-1.892h4.708c.022-.99-.418-2.618-2.222-2.618-1.672 0-2.376 1.518-2.486 2.618zm19.24-1.144v6.072c0 2.244-.462 3.85-1.584 4.862-1.1.99-2.662 1.298-4.136 1.298-1.364 0-2.816-.308-3.74-.858l.594-2.046c.682.396 1.826.814 3.124.814 1.76 0 3.08-.924 3.08-3.234v-.924h-.044c-.616.946-1.694 1.584-3.124 1.584-2.662 0-4.554-2.2-4.554-5.236 0-3.52 2.288-5.654 4.862-5.654 1.65 0 2.596.792 3.102 1.672h.044l.11-1.43h2.354c-.044.726-.088 1.606-.088 3.08zm-2.706 2.948v-1.738c0-.264-.022-.506-.088-.726-.286-.99-1.056-1.738-2.2-1.738-1.518 0-2.64 1.32-2.64 3.498 0 1.826.924 3.3 2.618 3.3 1.012 0 1.892-.66 2.2-1.65.088-.264.11-.638.11-.946zm5.622 4.686v-7.26c0-1.452-.022-2.508-.088-3.454h2.332l.11 2.024h.066c.528-1.496 1.782-2.266 2.948-2.266.264 0 .418.022.638.066v2.53c-.242-.044-.484-.066-.814-.066-1.276 0-2.178.814-2.42 2.046-.044.242-.066.528-.066.814v5.566zm16.05-6.424v3.85c0 .968.044 1.914.176 2.574h-2.442l-.198-1.188h-.066c-.638.836-1.76 1.43-3.168 1.43-2.156 0-3.366-1.562-3.366-3.19 0-2.684 2.398-4.07 6.358-4.048v-.176c0-.704-.286-1.87-2.178-1.87-1.056 0-2.156.33-2.882.792l-.528-1.76c.792-.484 2.178-.946 3.872-.946 3.432 0 4.422 2.178 4.422 4.532zm-2.64 2.662v-1.474c-1.914-.022-3.74.374-3.74 2.002 0 1.056.682 1.54 1.54 1.54 1.1 0 1.87-.704 2.134-1.474.066-.198.066-.396.066-.594zm5.6 3.762v-7.524c0-1.232-.044-2.266-.088-3.19h2.31l.132 1.584h.066c.506-.836 1.474-1.826 3.3-1.826 1.408 0 2.508.792 2.97 1.98h.044c.374-.594.814-1.034 1.298-1.342.616-.418 1.298-.638 2.2-.638 1.76 0 3.564 1.21 3.564 4.642v6.314h-2.64v-5.918c0-1.782-.616-2.838-1.914-2.838-.924 0-1.606.66-1.892 1.43-.088.242-.132.594-.132.902v6.424h-2.64v-6.204c0-1.496-.594-2.552-1.848-2.552-1.012 0-1.694.792-1.958 1.518-.088.286-.132.594-.132.902v6.336z" fill="var(--tme-logo-color)" fill-rule="nonzero"/>
            </g>
          </svg>
        </a>
        <a class="tgme_head_right_btn" href="https://t.me/MembershipAppBot">
          Open Bot
        </a>
      </div>
    </div>

    <!-- BODY -->
    <div class="tgme_body_wrap">
      <div class="tgme_page">

        <p class="cv-title">Join Channels</p>
        <p class="cv-subtitle">Join and verify each channel below to continue.</p>

        <div id="cv-channels"></div>

        <!-- Footer note — outside the card -->
        <p class="cv-footer-note" id="cv-footer-note"></p>

      </div>
    </div>

  </div>

  <!-- Toast -->
  <div class="cv-toast" id="cv-toast"></div>

  <!-- Wallpaper Script (UNCHANGED) -->
  <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>
  <script>
    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }
    document.body.classList.remove('no_transition');
  </script>

  <script>
    // ── CONFIG ───────────────────────────────────────────────
    const CHANNELS = [
      { name: 'Paradox Updates',   username: '@paradox_updates',   link: 'https://t.me/paradox_updates'   },
      { name: 'Paradox Community', username: '@paradox_community', link: 'https://t.me/paradox_community' },
    ];
    const FOOTER_NOTE = '⚠️ You must join and verify both channels to access the bot\'s features.';
    // ────────────────────────────────────────────────────────

    const tg = window.Telegram?.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    const state = CHANNELS.map(() => ({ joined: false, verified: false }));

    // ── Render cards ─────────────────────────────────────────
    document.getElementById('cv-footer-note').textContent = FOOTER_NOTE;
    const container = document.getElementById('cv-channels');

    CHANNELS.forEach((ch, i) => {
      const card = document.createElement('div');
      card.className = 'cv-card';
      card.innerHTML = `
        <div class="cv-card-top">
          <div class="cv-card-avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </svg>
          </div>
          <div class="cv-card-meta">
            <div class="cv-card-name">${ch.name}</div>
            <div class="cv-card-handle">${ch.username}</div>
          </div>
          <div class="cv-card-badge" id="badge-${i}">
            <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          </div>
        </div>
        <div class="cv-card-divider"></div>
        <div class="cv-card-actions">
          <button class="cv-btn cv-btn-join" id="btn-join-${i}" onclick="doJoin(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/>
            </svg>
            Join
          </button>
          <button class="cv-btn cv-btn-verify" id="btn-verify-${i}" onclick="doVerify(${i})">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            Verify
          </button>
        </div>
      `;
      container.appendChild(card);
    });

    // ── Join ─────────────────────────────────────────────────
    function doJoin(i) {
      if (state[i].verified) return;
      const ch = CHANNELS[i];
      if (tg) tg.openTelegramLink(ch.link);
      else window.open(ch.link, '_blank');

      state[i].joined = true;
      const btn = document.getElementById(`btn-join-${i}`);
      btn.classList.add('done');
      btn.disabled = true;
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Joined
      `;
      haptic('light');
      showToast('Tap Verify to confirm membership.', 'info');
    }

    // ── Verify ───────────────────────────────────────────────
    function doVerify(i) {
      if (state[i].verified) return;

      if (!state[i].joined) {
        showToast('Join the channel first!', 'error');
        haptic('error');
        return;
      }

      const btn = document.getElementById(`btn-verify-${i}`);
      btn.disabled = true;
      btn.innerHTML = `<span class="cv-spinner"></span> Checking…`;

      // Simulate API check — replace with real call
      setTimeout(() => {
        state[i].verified = true;

        btn.classList.add('done');
        btn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Verified
        `;

        document.getElementById(`badge-${i}`).classList.add('visible');
        haptic('success');

        if (state.every(s => s.verified)) {
          showToast('All channels verified! ✓', 'success');
          haptic('success');
          showMainButton();
        } else {
          showToast(`${CHANNELS[i].name} verified ✓`, 'success');
        }
      }, 1500);
    }

    // ── Main Button — shown ONLY when all verified ────────────
    function showMainButton() {
      if (!tg) return;
      tg.MainButton.setText('Continue →');
      tg.MainButton.show();
      tg.MainButton.onClick(closeApp);
    }

    function closeApp() {
      if (tg) tg.close();
      else showToast('App would close now (demo)', 'info');
    }

    // ── Toast ────────────────────────────────────────────────
    let _toastTimer;
    function showToast(msg, type) {
      const el = document.getElementById('cv-toast');
      el.textContent = msg;
      el.className = `cv-toast ${type || 'info'} show`;
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ── Haptic ───────────────────────────────────────────────
    function haptic(type) {
      if (!tg) return;
      if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'error')   tg.HapticFeedback.notificationOccurred('error');
      else tg.HapticFeedback.impactOccurred('light');
    }
  </script>

</body>
</html>
