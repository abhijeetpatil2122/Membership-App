<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join Panel</title>

<style>
body {
  font-family: monospace;
  background: #0f172a;
  color: #e5e7eb;
  padding: 20px;
}

.box {
  background: #020617;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 15px;
  margin-bottom: 15px;
}

a, button {
  display: inline-block;
  padding: 8px 12px;
  margin-top: 5px;
  border-radius: 6px;
  text-decoration: none;
}

.join { background: #22c55e; color: #000; }
.retry { background: #3b82f6; color: #fff; }

</style>
</head>

<body>

<h3>🔐 Join Required</h3>

<div class="box" id="status">Checking...</div>

<div class="box" id="channels"></div>

<button class="retry" onclick="check()">🔄 Retry</button>

<script>
const params = new URLSearchParams(window.location.search);
const webhookUrl = params.get("check");

function render(list) {
  let html = "";

  list.forEach(c => {
    html += `
      <div>
        ${c.joined ? "✅" : "❌"} ${c.channel}<br>
        ${!c.joined ? `<a class="join" href="${c.link}" target="_blank">Join</a>` : ""}
      </div><br>
    `;
  });

  document.getElementById("channels").innerHTML = html;
}

function check() {

  document.getElementById("status").innerText = "⏳ Checking...";

  fetch(webhookUrl)
    .then(r => r.json())
    .then(res => {

      if (!res || !res.channels) {
        document.getElementById("status").innerText = "⚠️ Error";
        return;
      }

      render(res.channels);

      if (res.joined) {
        document.getElementById("status").innerText = "✅ All joined";

        setTimeout(() => {
          window.close();
        }, 2000);

      } else {
        document.getElementById("status").innerText = "❌ Join all channels";
      }

    })
    .catch(() => {
      document.getElementById("status").innerText = "⚠️ Failed";
    });
}

check();
</script>

</body>
</html>
