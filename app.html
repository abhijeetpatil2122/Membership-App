<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Join Channels</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Telegram WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Telegram CSS -->
<link href="https://telegram.org/css/font-roboto.css" rel="stylesheet">
<link href="https://telegram.org/css/bootstrap.min.css" rel="stylesheet">
<link href="https://telegram.org/css/telegram.css" rel="stylesheet">

<style>
/* Custom card improvement (kept Telegram feel) */
.channel-card {
  background: var(--tg-theme-secondary-bg-color, #ffffffcc);
  border-radius: 14px;
  padding: 14px;
  margin-top: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.channel-header {
  font-weight: 500;
  font-size: 15px;
  margin-bottom: 10px;
}

/* Button spacing */
.channel-actions a {
  display: block;
  margin-top: 8px;
  text-align: center;
}

/* Footer note */
.footer-note {
  margin-top: 25px;
  font-size: 13px;
  color: #6c757d;
  text-align: center;
}
</style>

</head>

<body class="no_transition">

<!-- Background -->
<div class="tgme_background_wrap">
  <canvas id="tgme_background" class="tgme_background default"
    width="50" height="50"
    data-colors="dbddbb,6ba587,d5d88d,88b884"></canvas>
  <div class="tgme_background_pattern default"></div>
</div>

<div class="tgme_page_wrap">

  <!-- HEADER -->
  <div class="tgme_head_wrap">
    <div class="tgme_head">

      <a href="https://telegram.org" class="tgme_head_brand">
        <!-- ORIGINAL TELEGRAM LOGO -->
        <svg class="tgme_logo" height="34" viewBox="0 0 133 34" width="133">
          <g fill="none" fill-rule="evenodd">
            <circle cx="17" cy="17" r="17" fill="#0088cc"/>
            <text x="40" y="22" font-size="18" fill="#222">Telegram</text>
          </g>
        </svg>
      </a>

      <a class="tgme_head_right_btn" href="https://telegram.org/dl">
        Download
      </a>

    </div>
  </div>

  <!-- BODY -->
  <div class="tgme_body_wrap">
    <div class="tgme_page">

      <!-- TITLE -->
      <div class="tgme_page_title">
        Join Required Channels
      </div>

      <!-- CHANNEL 1 -->
      <div class="channel-card">
        <div class="channel-header">@TestChannelOne</div>

        <div class="channel-actions">
          <a class="tgme_action_button_new shine"
             onclick="joinChannel('https://t.me/TestChannelOne')">
             Join Channel
          </a>

          <a class="tgme_action_button_new"
             style="background:#e4e6eb;color:#000;"
             onclick="verifySingle(1)">
             Verify
          </a>
        </div>
      </div>

      <!-- CHANNEL 2 -->
      <div class="channel-card">
        <div class="channel-header">@TestChannelTwo</div>

        <div class="channel-actions">
          <a class="tgme_action_button_new shine"
             onclick="joinChannel('https://t.me/TestChannelTwo')">
             Join Channel
          </a>

          <a class="tgme_action_button_new"
             style="background:#e4e6eb;color:#000;"
             onclick="verifySingle(2)">
             Verify
          </a>
        </div>
      </div>

      <!-- FINAL VERIFY -->
      <div class="tgme_page_action" style="margin-top:25px;">
        <a class="tgme_action_button_new shine"
           style="background:#34c759;"
           onclick="verifyAll()">
           ✅ Verify All & Continue
        </a>
      </div>

      <!-- FOOTER NOTE -->
      <div class="footer-note">
        Join all channels above, then click <b>Verify</b>.<br>
        After that, press <b>Verify All</b> to continue.
      </div>

    </div>
  </div>

</div>

<!-- Telegram Wallpaper -->
<script src="https://telegram.org/js/tgwallpaper.min.js"></script>

<script>
var tme_bg = document.getElementById('tgme_background');
if (tme_bg) {
  TWallpaper.init(tme_bg);
  TWallpaper.animate(true);
}

/* WebApp */
let tg = window.Telegram.WebApp;
tg.expand();

/* Join */
function joinChannel(link) {
  window.open(link, "_blank");
}

/* Demo verify */
let joined = {1:false, 2:false};

function verifySingle(id){
  joined[id] = true;
  tg.showAlert("Channel " + id + " verified ✅");
}

/* Final verify */
function verifyAll(){
  if(joined[1] && joined[2]){
    tg.sendData(JSON.stringify({status:"joined"}));
    tg.showAlert("All channels joined 🎉");
  } else {
    tg.showAlert("Join all channels first ❌");
  }
}
</script>

</body>
</html>
