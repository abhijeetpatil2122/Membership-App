<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Channel Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Telegram CSS (required for background) -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <style>
    /* ── Custom overrides (keep Telegram background intact) ── */
    :root {
      --bg:      var(--tg-theme-bg-color,           #ffffff);
      --text:    var(--tg-theme-text-color,          #000000);
      --hint:    var(--tg-theme-hint-color,          #8e8e93);
      --card:    var(--tg-theme-bg-color,            #ffffff);
      --border:  var(--tg-theme-section-separator-color, rgba(0, 0, 0, 0.1));
      --ok:      #22c55e;
      --error:   #ef4444;
      --btn-bg:  var(--tg-theme-button-color,        #2481cc);
      --btn-txt: var(--tg-theme-button-text-color,   #ffffff);
    }

    /* Dark mode overrides */
    @media (prefers-color-scheme: dark) {
      :root {
        --card: var(--tg-theme-bg-color, #1c1c1e);
        --border: rgba(255, 255, 255, 0.1);
      }
    }

    /* Reset Telegram's page margins to fit our design */
    .tgme_page_wrap {
      padding: max(10px, env(safe-area-inset-top)) 14px max(80px, calc(env(safe-area-inset-bottom) + 80px));
    }
    .tgme_page {
      max-width: 560px;
      margin: 0 auto;
    }
    .tgme_head_right_btn {
      background: var(--btn-bg);
      color: var(--btn-txt);
    }
    .tgme_head_right_btn:hover { color: var(--btn-txt); opacity: 0.8; }

    /* Hide original page elements we don't need */
    .tgme_page_photo, .tgme_page_title, .tgme_page_extra, 
    .tgme_page_description, .tgme_page_action, .tgme_page_context_link_wrap, 
    .tgme_page_additional {
      display: none !important;
    }

    /* Make the page content visible */
    .tgme_page {
      background: transparent;
    }

    /* Custom card styles - SOLID WHITE */
    .custom-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      overflow: hidden;
      margin-bottom: 12px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Hero card with icon */
    .hero {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }
    .hero-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(36, 129, 204, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-icon svg {
      width: 48px;
      height: 48px;
    }
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--btn-bg);
      margin-bottom: 8px;
    }
    .hero-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.45;
    }

    /* Status bar - NO YELLOW, only red/green */
    #status {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      transition: all .25s;
    }
    #status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #status.ok {
      color: var(--ok);
    }
    #status.ok::before { background: var(--ok); }
    #status.error {
      color: var(--error);
    }
    #status.error::before { background: var(--error); }

    /* Channel list - SCROLLABLE */
    #channel-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 400px;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    #channel-list::-webkit-scrollbar {
      width: 4px;
    }
    #channel-list::-webkit-scrollbar-track {
      background: var(--border);
      border-radius: 4px;
    }
    #channel-list::-webkit-scrollbar-thumb {
      background: var(--btn-bg);
      border-radius: 4px;
    }

    /* Channel row - solid background */
    .channel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ch-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ch-avatar svg { fill: #fff; width: 20px; height: 20px; }
    .ch-info { flex: 1; min-width: 0; }
    .channel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.ok { color: #052e16; background: #86efac; }
    .badge.error { color: #7f1a1a; background: #fecaca; }

    /* Join button styles */
    .join-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      background: var(--btn-bg);
      color: var(--btn-txt);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s;
    }
    .join-btn:active { opacity: .75; transform: scale(0.97); }
    .join-btn:disabled { opacity: .5; cursor: default; transform: none; }
    .joined-btn {
      background: rgba(34,197,94,0.12);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,0.25);
      cursor: default;
    }
    .joined-btn svg {
      width: 14px;
      height: 14px;
      stroke: #22c55e;
    }
    .btn-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer notification - fixed at bottom */
    .footer-notification {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: #fff;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      text-align: center;
    }
    .footer-notification.show { opacity: 1; transform: translateY(0); }
    .footer-notification.ok { background: #22c55e; }
    .footer-notification.error { background: #ef4444; }
  </style>
</head>

  <!-- Telegram Wallpaper Script -->
  <script src="https://telegram.org/js/tgwallpaper.min.js?3"></script>

  <script>
    // Initialize Telegram Wallpaper (EXACT from source)
    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg && window.TWallpaper) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }
    document.body.classList.remove('no_transition');

    // Dark mode support
    function toggleTheme(dark) {
      document.documentElement.classList.toggle('theme_dark', dark);
      window.Telegram && Telegram.setWidgetOptions && Telegram.setWidgetOptions({dark: dark});
    }
    if (window.matchMedia) {
      var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
      toggleTheme(darkMedia.matches);
      darkMedia.addListener(function(e) { toggleTheme(e.matches); });
    }

    // ── WebApp Logic ─────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const listEl = document.getElementById('channel-list');
    const toastEl = document.getElementById('footerNotification');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    let toastTimer;
    function showNotification(message, type, duration = 2500) {
      toastEl.textContent = message;
      toastEl.className = `footer-notification ${type} show`;
      if (tg && type === 'ok') tg.HapticFeedback?.notificationOccurred('success');
      if (tg && type === 'error') tg.HapticFeedback?.notificationOccurred('error');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    function setStatus(kind, message) {
      statusEl.className = kind;
      statusEl.textContent = message;
      if (kind === 'ok') subtitleEl.textContent = '✓ All channels verified!';
      else if (kind === 'error') subtitleEl.textContent = '❌ Verification failed';
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function isValidWebhookUrl(url) {
      if (!url) return false;
      try { return new URL(url).protocol === 'https:'; } catch { return false; }
    }

    function renderChannels(channels) {
      listEl.innerHTML = '';
      if (!channels.length) {
        listEl.innerHTML = '<div style="padding:14px;text-align:center;color:var(--hint)">No channels from webhook</div>';
        return;
      }
      channels.forEach((ch, idx) => {
        const title = ch.channel || ch.title || ch.id || `Channel ${idx + 1}`;
        const joined = Boolean(ch.joined);
        const row = document.createElement('article');
        row.className = 'channel';
        const avatar = document.createElement('div');
        avatar.className = 'ch-avatar';
        avatar.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
        const infoDiv = document.createElement('div');
        infoDiv.className = 'ch-info';
        infoDiv.innerHTML = `<div class="channel-title">${escapeHtml(title)}</div><span class="badge ${joined ? 'ok' : 'error'}">${joined ? '✓ Joined' : '✗ Not joined'}</span>`;
        row.appendChild(avatar);
        row.appendChild(infoDiv);
        if (!joined && ch.link) {
          const btn = document.createElement('button');
          btn.className = 'join-btn';
          btn.innerHTML = 'Join';
          btn.onclick = () => {
            tg?.HapticFeedback?.impactOccurred('light');
            if (tg) tg.openTelegramLink(ch.link);
            else window.open(ch.link, '_blank');
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner"></span> Opening…';
            setTimeout(() => {
              if (!btn.disabled) return;
              btn.innerHTML = 'Join';
              btn.disabled = false;
            }, 3000);
          };
          row.appendChild(btn);
        } else if (joined) {
          const doneBtn = document.createElement('button');
          doneBtn.className = 'join-btn joined-btn';
          doneBtn.disabled = true;
          doneBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Joined';
          row.appendChild(doneBtn);
        }
        listEl.appendChild(row);
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try { return await fetch(url, { ...options, signal: controller.signal }); }
      finally { clearTimeout(timer); }
    }

    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing webhook URL');
        showNotification('Missing ?check= webhook URL', 'error');
        return;
      }
      try {
        setStatus('error', 'Verifying memberships...');
        tg?.HapticFeedback?.impactOccurred('medium');
        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now());
        const resp = await fetchWithTimeout(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg?.initData || null, platform: tg?.platform || null })
        }, 12000);
        const data = await resp.json();
        if (!resp.ok || !data?.ok) throw new Error(data?.error || 'Webhook error');
        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);
        if (data.joined) {
          setStatus('ok', '✅ All channels joined! Closing...');
          showNotification('Verification complete! Closing app...', 'ok', 1800);
          tg?.HapticFeedback?.notificationOccurred('success');
          tg?.MainButton?.setText('Verified ✓');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          setTimeout(() => tg?.close(), 1500);
          return;
        }
        setStatus('error', '✗ Join missing channels and tap Main Button');
        showNotification('Please join pending channels and re-check', 'error');
        tg?.MainButton?.setText('Re-check');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } catch (err) {
        const isAbort = err?.name === 'AbortError';
        setStatus('error', isAbort ? 'Webhook timeout' : err.message);
        showNotification(isAbort ? 'Request timeout — tap Retry' : err.message, 'error');
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      }
    }

    function initApp() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK missing');
        showNotification('Open from Telegram bot', 'error');
        return;
      }
      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(runCheck);
      runCheck();
    }

    initApp();
  </script>
</body>
</html>
