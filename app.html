<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join Check WebApp</title>

<style>
body {
  font-family: monospace;
  background: #0f172a;
  color: #e5e7eb;
  padding: 20px;
}

.box {
  background: #020617;
  border: 1px solid #334155;
  border-radius: 6px;
  padding: 15px;
  margin-bottom: 15px;
}

button, a {
  display: inline-block;
  padding: 10px 14px;
  margin: 5px 5px 0 0;
  border: 0;
  border-radius: 6px;
  cursor: pointer;
  text-decoration: none;
}

.join { background: #22c55e; color: #000; }
.retry { background: #3b82f6; color: #fff; }

pre {
  white-space: pre-wrap;
  word-break: break-word;
}
</style>
</head>

<body>

<h2>🔐 Channel Join Check</h2>

<div class="box">
<b>Webhook URL</b>
<pre id="webhook">Loading...</pre>
</div>

<div class="box">
<b>Status:</b><br>
<span id="status">Checking...</span><br><br>

<a id="joinBtn" class="join" href="#" target="_blank">Join Channel</a>
<button class="retry" onclick="check()">Retry</button>
</div>

<div class="box">
<b>Response</b>
<pre id="response">{}</pre>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const webhookUrl = params.get("check");

document.getElementById("webhook").innerText = webhookUrl;

function check(){

  document.getElementById("status").innerText = "⏳ Checking...";
  document.getElementById("response").innerText = "Loading...";

  fetch(webhookUrl)
    .then(r => r.json())
    .then(res => {

      // DEBUG
      document.getElementById("response").innerText =
        JSON.stringify(res, null, 2);

      // SAFE DATA
      let channel = (res && res.channel) ? res.channel : "@unknown";
      let joined = (res && res.joined) ? true : false;

      // FIX replace crash
      let clean = channel.replace("@", "");
      let link = "https://t.me/" + clean;

      document.getElementById("joinBtn").href = link;

      // STATUS UI
      if (joined) {
        document.getElementById("status").innerText = "✅ You joined the channel";
      } else {
        document.getElementById("status").innerText = "❌ Not joined yet";
      }

    })
    .catch(err => {
      document.getElementById("response").innerText = err.toString();
      document.getElementById("status").innerText = "⚠️ Error loading";
    });
}

// AUTO RUN
check();
</script>

</body>
</html>
