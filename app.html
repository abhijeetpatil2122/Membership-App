<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Telegram WebApp</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Telegram CSS -->
<link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
<link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
<link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

<!-- WebApp SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* ===== FIX CARD SPACING ===== */
.tgme_page_action{
  padding:16px;
  border-radius:12px;
  margin-bottom:14px;
}

/* ===== BUTTON FIX ===== */
.tgme_action_button_new{
  width:100%;
  border-radius:10px;
  padding:12px;
  font-weight:500;
  transition:0.2s;
}

/* ===== REAL SHINE ===== */
.shine{
  position:relative;
  overflow:hidden;
}

.shine::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  animation: shineMove 2.2s infinite;
}

@keyframes shineMove{
  0% { left:-100%; }
  100% { left:120%; }
}

/* ===== FOOTER ===== */
.footer_note{
  text-align:center;
  font-size:13px;
  opacity:0.7;
  margin-top:20px;
}

</style>

</head>

<body class="no_transition">

<!-- ===== BACKGROUND (RESTORED) ===== -->
<div class="tgme_background_wrap">
  <canvas id="tgme_background"
          class="tgme_background default"
          width="50" height="50"
          data-colors="dbddbb,6ba587,d5d88d,88b884">
  </canvas>
  <div class="tgme_background_pattern default"></div>
</div>

<div class="tgme_page_wrap">

<!-- ===== HEADER (RESTORED) ===== -->
<div class="tgme_head_wrap">
  <div class="tgme_head">

    <a href="//telegram.org/" class="tgme_head_brand">
      <b>Telegram</b>
    </a>

    <a class="tgme_head_right_btn" href="https://t.me/MembershipAppBot">
      Open Bot
    </a>

  </div>
</div>

<!-- ===== BODY ===== -->
<div class="tgme_body_wrap">
<div class="tgme_page">

<div class="tgme_page_title">
  Join Required Channels
</div>

<!-- CHANNEL 1 -->
<div class="tgme_page_action">

<div style="margin-bottom:10px;font-weight:500;">
  @TestChannelOne
</div>

<div style="display:flex; gap:10px; flex-direction:column;">

<a class="tgme_action_button_new"
   onclick="joinChannel('https://t.me/TestChannelOne')">
  Join Channel
</a>

<a class="tgme_action_button_new shine"
   id="verify1"
   onclick="verifySingle(1)">
  Verify
</a>

</div>
</div>

<!-- CHANNEL 2 -->
<div class="tgme_page_action">

<div style="margin-bottom:10px;font-weight:500;">
  @TestChannelTwo
</div>

<div style="display:flex; gap:10px; flex-direction:column;">

<a class="tgme_action_button_new"
   onclick="joinChannel('https://t.me/TestChannelTwo')">
  Join Channel
</a>

<a class="tgme_action_button_new shine"
   id="verify2"
   onclick="verifySingle(2)">
  Verify
</a>

</div>
</div>

<!-- FINAL VERIFY -->
<div class="tgme_page_action">
<a class="tgme_action_button_new shine"
   onclick="verifyAll()">
  ✅ Verify All & Continue
</a>
</div>

<!-- FOOTER -->
<div class="footer_note">
  Join all channels to unlock access 🚀
</div>

</div>
</div>
</div>

<!-- ===== WALLPAPER SCRIPT (RESTORED) ===== -->
<script src="//telegram.org/js/tgwallpaper.min.js?3"></script>

<script>
var tme_bg = document.getElementById('tgme_background');
if (tme_bg) {
  TWallpaper.init(tme_bg);
  TWallpaper.animate(true);
  window.onfocus = function(){ TWallpaper.update(); };
}

document.body.classList.remove('no_transition');

/* ===== TELEGRAM WEBAPP ===== */
let tg = window.Telegram.WebApp;
tg.expand();

/* ===== APPLY THEME ===== */
function applyTheme(){
  let p = tg.themeParams;

  document.body.style.background = p.bg_color;
  document.body.style.color = p.text_color;

  document.querySelectorAll(".tgme_action_button_new").forEach(btn=>{
    btn.style.background = p.button_color;
    btn.style.color = p.button_text_color;
  });
}

applyTheme();

/* ===== LOGIC ===== */
function joinChannel(link){
  window.open(link, "_blank");
}

let joined = {1:false,2:false};

function verifySingle(id){
  joined[id] = true;

  let btn = document.getElementById("verify"+id);
  btn.innerText = "✅ Verified";
  btn.style.opacity = "0.7";

  tg.showAlert("Channel "+id+" verified ✅");
}

function verifyAll(){
  if(joined[1] && joined[2]){
    tg.sendData("joined");

    tg.showAlert("All channels joined 🎉");

    setTimeout(()=>{
      tg.close();
    },1200);

  } else {
    tg.showAlert("Join all channels first ❌");
  }
}

</script>

</body>
</html>
