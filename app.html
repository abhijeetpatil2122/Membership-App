<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Channel Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet" type="text/css">

  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --bg:      var(--tg-theme-bg-color,           #0b1020);
      --text:    var(--tg-theme-text-color,          #eff6ff);
      --hint:    var(--tg-theme-hint-color,          #93a4bf);
      --card:    rgba(15, 23, 42, 0.76);
      --border:  rgba(148, 163, 184, 0.18);
      --ok:      #22c55e;
      --warn:    #f59e0b;
      --error:   #ef4444;
      --btn-bg:  var(--tg-theme-button-color,        #2aabee);
      --btn-txt: var(--tg-theme-button-text-color,   #ffffff);
      --accent-btn-color: var(--tg-theme-button-color, #2aabee);
      --tme-logo-color: #ffffff;
    }

    /* ── Reset ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Wallpaper (EXACT from Telegram source - NO PATTERN) ── */
    .tgme_background_wrap {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
      overflow: hidden;
    }
    .tgme_background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .tgme_background_pattern {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  background-repeat: repeat;
  background-size: 50px 50px;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 50 50'%3e%3cpath fill='none' stroke='rgba(255,255,255,0.08)' stroke-width='1'%3e%3cpath d='M0 0h50v50H0z'/%3e%3c/path%3e%3c/svg%3e");
}

    /* ── Page wrap ──────────────────────────────────────────── */
    .tgme_page_wrap {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      padding: max(10px, env(safe-area-inset-top)) 14px max(80px, calc(env(safe-area-inset-bottom) + 80px));
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .tgme_head_wrap {
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.60);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .tgme_head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      gap: 10px;
    }
    .tgme_head_brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }
    .tgme_logo { width: 120px; height: 30px; }
    .tgme_head_right_btn {
      border-radius: 9px;
      padding: 7px 16px;
      background: var(--btn-bg);
      color: var(--btn-txt);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .tgme_head_right_btn:active { opacity: 0.7; }

    /* ── Body ───────────────────────────────────────────────── */
    .tgme_body_wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tgme_page {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Generic card ───────────────────────────────────────── */
    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
    }

    /* ── Hero card with LARGE lock icon ─────────────────────── */
    .hero {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }
    .hero-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(42,171,238,0.12);
      border: 1px solid rgba(42,171,238,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hero-icon svg {
      width: 44px;
      height: 44px;
    }
    .hero-text { width: 100%; }
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--btn-bg);
      margin-bottom: 8px;
    }
    .hero-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.45;
    }

    /* ── Status bar with dynamic colors ────────────────────── */
    #status {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      transition: all .25s;
    }
    #status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .25s;
    }
    #status.ok {
      background: rgba(34,197,94,0.08);
      color: #86efac;
    }
    #status.ok::before { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
    #status.warn {
      background: rgba(245,158,11,0.08);
      color: #fde68a;
    }
    #status.warn::before { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    #status.error {
      background: rgba(239,68,68,0.08);
      color: #fecaca;
    }
    #status.error::before { background: var(--error); box-shadow: 0 0 6px var(--error); }

    /* ── Channel list ───────────────────────────────────────── */
    #channel-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Channel row ────────────────────────────────────────── */
    .channel {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ch-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ch-avatar svg { fill: #fff; width: 20px; height: 20px; }
    .ch-info { flex: 1; min-width: 0; }
    .channel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.ok { color: #052e16; background: #86efac; }
    .badge.warn { color: #451a03; background: #fcd34d; }

    /* ── Join button styles ─────────────────────────────────── */
    .join-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      background: var(--btn-bg);
      color: var(--btn-txt);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s;
    }
    .join-btn:active { opacity: .75; transform: scale(0.97); }
    .join-btn:disabled { opacity: .5; cursor: default; transform: none; }
    .joined-btn {
      background: rgba(34,197,94,0.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.25);
      cursor: default;
    }
    .joined-btn svg {
      width: 14px;
      height: 14px;
      stroke: #86efac;
    }
    .btn-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer notification ────────────────────────────────── */
    .footer-notification {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: max(16px, env(safe-area-inset-bottom));
      z-index: 30;
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      color: #fff;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
      text-align: center;
    }
    .footer-notification.show { opacity: 1; transform: translateY(0); }
    .footer-notification.ok { background: rgba(34,197,94,0.95); border-left: 3px solid #fff; }
    .footer-notification.warn { background: rgba(245,158,11,0.95); border-left: 3px solid #fff; }
    .footer-notification.error { background: rgba(239,68,68,0.95); border-left: 3px solid #fff; }
    .footer-notification.info { background: rgba(42,171,238,0.95); border-left: 3px solid #fff; }

    /* Footer note text */
    .footer-note {
      font-size: 11px;
      color: var(--hint);
      line-height: 1.4;
      text-align: center;
      padding: 8px 4px;
      opacity: 0.7;
    }
  </style>
</head>

  <script>
    // ── Wallpaper init (EXACT from Telegram source) ──────────
    function initWallpaper() {
      const bgCanvas = document.getElementById('tgme_background');
      if (bgCanvas && window.TWallpaper) {
        try {
          TWallpaper.init(bgCanvas);
          TWallpaper.animate(true);
          window.onfocus = function() { TWallpaper.update(); };
        } catch(e) { console.warn('TWallpaper error:', e); }
      }
      document.body.classList.remove('no_transition');
    }

    // ── Refs ─────────────────────────────────────────────────
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const listEl = document.getElementById('channel-list');
    const toastEl = document.getElementById('footerNotification');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    // ── Show notification with haptic ────────────────────────
    let toastTimer;
    function showNotification(message, type, duration = 2500) {
      toastEl.textContent = message;
      toastEl.className = `footer-notification ${type} show`;
      if (tg && type === 'ok') tg.HapticFeedback?.notificationOccurred('success');
      if (tg && type === 'error') tg.HapticFeedback?.notificationOccurred('error');
      if (tg && type === 'warn') tg.HapticFeedback?.notificationOccurred('warning');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // ── Dynamic status update ────────────────────────────────
    function setStatus(kind, message) {
      statusEl.className = kind;
      statusEl.textContent = message;
      if (kind === 'ok') subtitleEl.textContent = '✓ All channels verified!';
      else if (kind === 'warn') subtitleEl.textContent = '⚠️ Join missing channels and re-check';
      else if (kind === 'error') subtitleEl.textContent = '❌ Verification failed';
    }

    // ── Helpers ──────────────────────────────────────────────
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function isValidWebhookUrl(url) {
      if (!url) return false;
      try { return new URL(url).protocol === 'https:'; } catch { return false; }
    }

    // ── Render channels with proper joined button ────────────
    function renderChannels(channels) {
      listEl.innerHTML = '';
      if (!channels.length) {
        listEl.innerHTML = '<div style="padding:14px;text-align:center;color:var(--hint)">No channels from webhook</div>';
        return;
      }
      channels.forEach((ch, idx) => {
        const title = ch.channel || ch.title || ch.id || `Channel ${idx + 1}`;
        const joined = Boolean(ch.joined);
        const row = document.createElement('article');
        row.className = 'channel';
        const avatar = document.createElement('div');
        avatar.className = 'ch-avatar';
        avatar.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
        const infoDiv = document.createElement('div');
        infoDiv.className = 'ch-info';
        infoDiv.innerHTML = `<div class="channel-title">${escapeHtml(title)}</div><span class="badge ${joined ? 'ok' : 'warn'}">${joined ? '✓ Joined' : '✗ Not joined'}</span>`;
        row.appendChild(avatar);
        row.appendChild(infoDiv);
        if (!joined && ch.link) {
          const btn = document.createElement('button');
          btn.className = 'join-btn';
          btn.innerHTML = 'Join';
          btn.onclick = () => {
            tg?.HapticFeedback?.impactOccurred('light');
            if (tg) tg.openTelegramLink(ch.link);
            else window.open(ch.link, '_blank');
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner"></span> Opening…';
            setTimeout(() => {
              if (!btn.disabled) return;
              btn.innerHTML = 'Join';
              btn.disabled = false;
            }, 3000);
          };
          row.appendChild(btn);
        } else if (joined) {
          const doneBtn = document.createElement('button');
          doneBtn.className = 'join-btn joined-btn';
          doneBtn.disabled = true;
          doneBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg> Joined';
          row.appendChild(doneBtn);
        }
        listEl.appendChild(row);
      });
    }

    // ── Fetch wrapper ────────────────────────────────────────
    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try { return await fetch(url, { ...options, signal: controller.signal }); }
      finally { clearTimeout(timer); }
    }

    // ── Main verification ────────────────────────────────────
    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing webhook URL');
        showNotification('Missing ?check= webhook URL', 'error');
        return;
      }
      try {
        setStatus('warn', 'Verifying memberships...');
        tg?.HapticFeedback?.impactOccurred('medium');
        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now());
        const resp = await fetchWithTimeout(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ initData: tg?.initData || null, platform: tg?.platform || null })
        }, 12000);
        const data = await resp.json();
        if (!resp.ok || !data?.ok) throw new Error(data?.error || 'Webhook error');
        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);
        if (data.joined) {
          setStatus('ok', '✅ All channels joined! Closing...');
          showNotification('Verification complete! Closing app...', 'ok', 1800);
          tg?.HapticFeedback?.notificationOccurred('success');
          tg?.MainButton?.setText('Verified ✓');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          setTimeout(() => tg?.close(), 1500);
          return;
        }
        setStatus('warn', '⚠️ Join missing channels and tap Main Button');
        showNotification('Please join pending channels and re-check', 'warn');
        tg?.MainButton?.setText('Re-check');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } catch (err) {
        const isAbort = err?.name === 'AbortError';
        setStatus('error', isAbort ? 'Webhook timeout' : err.message);
        showNotification(isAbort ? 'Request timeout — tap Retry' : err.message, 'error');
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      }
    }

    // ── Bootstrap ────────────────────────────────────────────
    function initApp() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK missing');
        showNotification('Open from Telegram bot', 'error');
        return;
      }
      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(runCheck);
      runCheck();
    }

    initWallpaper();
    initApp();
  </script>
</body>
