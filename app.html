<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Join Check</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 30px;
  background: #0f172a;
  color: white;
}
a, button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  border-radius: 6px;
  text-decoration: none;
  border: none;
  cursor: pointer;
}
.join { background: #2563eb; color: white; }
.retry { background: #16a34a; color: white; }
</style>

</head>
<body>

<h2>🔐 Checking Access...</h2>

<script>
const params = new URLSearchParams(location.search);
const url = params.get("check");

function load() {
  fetch(url)
    .then(r => r.json())
    .then(res => {

      if (res.joined) {

        document.body.innerHTML =
          "<h2>✅ Access Granted</h2>" +
          "<button onclick='continueBot()'>Continue</button>";

      } else {

        let html = "<h3>❌ Join required</h3>";

        res.channels.forEach(c => {
          let link = "https://t.me/" + c.replace("@","");
          html += `<a class="join" href="${link}" target="_blank">Join ${c}</a>`;
        });

        html += "<button class='retry' onclick='load()'>🔄 Recheck</button>";

        document.body.innerHTML = html;
      }
    })
    .catch(e => {
      document.body.innerHTML = "❌ Error loading WebApp";
    });
}

function continueBot() {
  Telegram.WebApp.close();
}

load();
</script>

</body>
</html>
