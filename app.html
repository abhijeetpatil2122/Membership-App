<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Channel Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches&&document.documentElement.classList.add('theme_dark');</script>

<link rel="icon" href="//telegram.org/img/website_icon.svg?4">
<link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
<link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
<link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* KEEP YOUR FULL CSS SAME */
.cv-channel-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
.theme_dark .cv-channel-row{border-bottom-color:rgba(255,255,255,0.06)}
.cv-channel-row:last-of-type{border-bottom:none;margin-bottom:4px}

.cv-avatar{width:50px;height:50px;border-radius:50%;background:var(--accent-btn-color,#3390ec);display:flex;align-items:center;justify-content:center}
.cv-avatar svg{fill:#fff;width:24px;height:24px}

.cv-meta{flex:1}
.cv-name{font-size:15px;font-weight:600}
.cv-handle{font-size:13px;color:#999}

.cv-btns{display:flex;gap:7px}
.cv-btn{border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}

.cv-btn-join{background:#3390ec;color:#fff}
.cv-btn-join.done{background:#e8f5e9;color:#43a047}

.cv-btn-verify{background:#eee}
.cv-btn-verify.done{background:#e8f5e9;color:#43a047}

.cv-verified-badge{opacity:0;transform:scale(.5);transition:.3s}
.cv-verified-badge.show{opacity:1;transform:scale(1)}

.cv-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;color:#fff;opacity:0;transition:.3s}
.cv-toast.show{opacity:1}
.cv-toast.success{background:#43a047}
.cv-toast.error{background:#e53935}
.cv-toast.info{background:#1e88e5}
</style>
</head>

<body class="no_transition">

<div class="tgme_background_wrap">
<canvas id="tgme_background" class="tgme_background default"></canvas>
<div class="tgme_background_pattern default"></div>
</div>

<div class="tgme_page_wrap">

<div class="tgme_head_wrap">
<div class="tgme_head">
<a href="//telegram.org/" class="tgme_head_brand">Telegram</a>
<a class="tgme_head_right_btn" href="https://t.me/MembershipAppBot">Open Bot</a>
</div>
</div>

<div class="tgme_body_wrap">
<div class="tgme_page">

<div class="tgme_page_title">
Join Required Channels
</div>

<div id="cv-channel-list"></div>

<div class="tgme_page_action" id="cv-main-action" style="display:none;">
<a class="tgme_action_button_new shine" href="#" id="cv-continue-btn">Continue</a>
</div>

<div class="tgme_page_additional cv-footer">
⚠️ Join all channels to continue
</div>

</div>
</div>
</div>

<div id="cv-toast" class="cv-toast"></div>

<script src="//telegram.org/js/tgwallpaper.min.js?3"></script>

<script>

// ===== TELEGRAM INIT =====
var tg = window.Telegram.WebApp;
tg.expand();

// ===== GET WEBHOOK =====
const params = new URLSearchParams(location.search);
const webhook = params.get("check");

// ===== CHANNEL CONFIG =====
const CHANNELS = [
  { name:"Paradox Updates", username:"@paradox_updates", link:"https://t.me/paradox_updates" },
  { name:"Paradox Community", username:"@paradox_community", link:"https://t.me/paradox_community" }
];

// ===== STATE =====
let state = CHANNELS.map(()=>({verified:false}));

// ===== BUILD UI =====
let list = document.getElementById("cv-channel-list");

CHANNELS.forEach((ch,i)=>{
  let row = document.createElement("div");
  row.className="cv-channel-row";
  row.innerHTML=`
    <div class="cv-avatar">📢</div>
    <div class="cv-meta">
      <div class="cv-name">${ch.name}</div>
      <div class="cv-handle">${ch.username}</div>
    </div>
    <div class="cv-btns">
      <button class="cv-btn cv-btn-join" onclick="join(${i})" id="j${i}">Join</button>
      <button class="cv-btn cv-btn-verify" onclick="verify(${i})" id="v${i}">Verify</button>
    </div>
    <div class="cv-verified-badge" id="b${i}">✔</div>
  `;
  list.appendChild(row);
});

// ===== JOIN =====
function join(i){
  tg.openTelegramLink(CHANNELS[i].link);
}

// ===== VERIFY =====
function verify(i){

  let btn = document.getElementById("v"+i);
  btn.innerText="Checking...";

  fetch(webhook)
  .then(r=>r.json())
  .then(res=>{

    if(!res.ok){ showToast("Server error","error"); return; }

    let results = res.results;

    if(results[i]){
      mark(i);
      showToast("Verified","success");
    }else{
      btn.innerText="Verify";
      showToast("Join first","error");
    }

    if(results.every(x=>x)){
      unlock();
    }

  })
  .catch(()=>showToast("Error","error"));
}

// ===== MARK VERIFIED =====
function mark(i){
  state[i].verified=true;

  document.getElementById("v"+i).classList.add("done");
  document.getElementById("v"+i).innerText="Verified";

  document.getElementById("j"+i).classList.add("done");
  document.getElementById("j"+i).innerText="Joined";

  document.getElementById("b"+i).classList.add("show");
}

// ===== LOAD INITIAL STATUS =====
function initCheck(){

  fetch(webhook)
  .then(r=>r.json())
  .then(res=>{

    if(!res.ok) return;

    res.results.forEach((v,i)=>{
      if(v) mark(i);
    });

    if(res.results.every(x=>x)){
      unlock();
    }

  });

}

initCheck();

// ===== UNLOCK =====
function unlock(){

  document.getElementById("cv-main-action").style.display="";

  tg.MainButton.setText("Continue");
  tg.MainButton.show();

  tg.MainButton.onClick(()=>{
    tg.sendData("joined");
    tg.close();
  });

}

// ===== TOAST =====
function showToast(msg,type){
  let el=document.getElementById("cv-toast");
  el.innerText=msg;
  el.className="cv-toast "+type+" show";
  setTimeout(()=>el.classList.remove("show"),2500);
}

</script>

</body>
</html>
