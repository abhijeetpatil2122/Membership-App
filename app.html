<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Channel Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Telegram CSS (required for wallpaper canvas rendering) -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <style>
    /* ── Tokens ── */
    :root {
      --bg:      var(--tg-theme-bg-color,           #0b1020);
      --text:    var(--tg-theme-text-color,          #eff6ff);
      --hint:    var(--tg-theme-hint-color,          #93a4bf);
      --card:    rgba(15, 23, 42, 0.76);
      --border:  rgba(148, 163, 184, 0.18);
      --ok:      #22c55e;
      --error:   #ef4444;
      --btn-bg:  var(--tg-theme-button-color,        #2aabee);
      --btn-txt: var(--tg-theme-button-text-color,   #ffffff);
    }

    /* ── FIX 1: Background canvas — force fixed positioning ── */
    .tgme_background_wrap {
      position: fixed !important;
      inset: 0 !important;
      z-index: 0 !important;
      width: 100% !important;
      height: 100% !important;
      overflow: hidden !important;
    }
    #tgme_background {
      width: 100% !important;
      height: 100% !important;
      display: block !important;
      object-fit: cover !important;
    }
    .tgme_background_pattern {
      position: absolute !important;
      inset: 0 !important;
    }

    /* ── FIX 2: Page wrap — scrollable, above fixed bg ── */
    .tgme_page_wrap {
      position: relative !important;
      z-index: 1 !important;
      min-height: 100dvh !important;
      overflow-y: auto !important;
      -webkit-overflow-scrolling: touch !important;
      padding: max(10px, env(safe-area-inset-top)) 14px max(90px, calc(env(safe-area-inset-bottom) + 90px)) !important;
      box-sizing: border-box !important;
    }

    /* ── Page container ── */
    .tgme_body_wrap { display: block !important; }
    .tgme_page {
      max-width: 560px !important;
      margin: 0 auto !important;
      background: transparent !important;
      box-shadow: none !important;
      border-radius: 0 !important;
    }

    /* ── Header Open Bot button — branded colour ── */
    .tgme_head_right_btn {
      background: var(--btn-bg) !important;
      color: var(--btn-txt) !important;
      border: none !important;
      font-weight: 600 !important;
    }
    .tgme_head_right_btn:hover { opacity: 0.85 !important; color: var(--btn-txt) !important; }

    /* Hide Telegram's original page elements — we render our own ── */
    .tgme_page_photo,
    .tgme_page_title,
    .tgme_page_extra,
    .tgme_page_description,
    .tgme_page_action,
    .tgme_page_context_link_wrap,
    .tgme_page_additional { display: none !important; }

    /* ── Card ── */
    .custom-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      overflow: hidden;
      margin-bottom: 12px;
    }

    /* ── Hero ── */
    .hero {
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 16px;
    }
    .hero-icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(42,171,238,0.12);
      border: 1px solid rgba(42,171,238,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hero-icon svg { width: 44px; height: 44px; }
    .hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--btn-bg);
      margin-bottom: 8px;
    }
    .hero-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: 14px;
      color: var(--hint);
      line-height: 1.45;
    }

    /* ── Status bar — NO yellow, only green/red/neutral ── */
    #status {
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--hint);
      background: transparent;
      transition: background .25s, color .25s;
    }
    #status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--hint);
      transition: background .25s, box-shadow .25s;
    }
    /* Green — all good */
    #status.ok {
      background: rgba(34,197,94,0.08);
      color: #86efac;
    }
    #status.ok::before {
      background: var(--ok);
      box-shadow: 0 0 6px var(--ok);
    }
    /* Red — error OR pending (no yellow) */
    #status.error {
      background: rgba(239,68,68,0.08);
      color: #fecaca;
    }
    #status.error::before {
      background: var(--error);
      box-shadow: 0 0 6px var(--error);
    }

    /* ── FIX 3: Channel list — fully scrollable inside card ── */
    #channel-list {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      /* No max-height cap — grows naturally, page itself scrolls */
    }

    /* ── Channel row ── */
    .channel {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .ch-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ch-avatar svg { fill: #fff; width: 20px; height: 20px; }
    .ch-info { flex: 1; min-width: 0; }
    .channel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }
    /* Badge — green or red only */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.ok    { color: #052e16; background: #86efac; }
    .badge.error { color: #fff;    background: rgba(239,68,68,0.75); }

    /* ── Join / Joined button ── */
    .join-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      background: var(--btn-bg);
      color: var(--btn-txt);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s, transform .1s;
    }
    .join-btn:active  { opacity: .75; transform: scale(0.97); }
    .join-btn:disabled { opacity: .5; cursor: default; transform: none; }

    .joined-btn {
      background: rgba(34,197,94,0.12);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.25);
      cursor: default;
      pointer-events: none;
    }
    .joined-btn svg {
      width: 16px;
      height: 16px;
      fill: #86efac;
      flex-shrink: 0;
    }

    /* Spinner */
    .btn-spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin .65s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FIX 4 + 5: Footer notification — pill, small, green/red only ── */
    .footer-notification {
      position: fixed;
      left: 50%;
      bottom: max(20px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(10px);
      z-index: 30;
      /* Pill style */
      border-radius: 999px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s ease, transform .22s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,.35);
      /* default */
      background: #1e293b;
    }
    .footer-notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    /* Green pill */
    .footer-notification.ok    { background: #15803d; }
    /* Red pill */
    .footer-notification.error { background: #b91c1c; }

    /* ── Footer note ── */
    .footer-note {
      font-size: 11px;
      color: var(--hint);
      line-height: 1.4;
      text-align: center;
      padding: 4px 4px 8px;
      opacity: 0.65;
    }
  </style>
</head>

  <!-- Wallpaper script — exact copy from original Telegram source -->
  <script src="https://telegram.org/js/tgwallpaper.min.js?3"></script>
  <script>
    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg && window.TWallpaper) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }
    document.body.classList.remove('no_transition');

    function toggleTheme(dark) {
      document.documentElement.classList.toggle('theme_dark', dark);
      window.Telegram && Telegram.setWidgetOptions && Telegram.setWidgetOptions({dark: dark});
    }
    if (window.matchMedia) {
      var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
      toggleTheme(darkMedia.matches);
      darkMedia.addListener(function(e){ toggleTheme(e.matches); });
    }
  </script>

  <script>
    // ── Refs ─────────────────────────────────────────────────
    const tg            = window.Telegram?.WebApp;
    const statusEl      = document.getElementById('status');
    const subtitleEl    = document.getElementById('subtitle');
    const listEl        = document.getElementById('channel-list');
    const toastEl       = document.getElementById('footerNotification');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    // ── Pill notification — green or red only, no yellow ─────
    let _toastTimer;
    function showNotification(message, type, duration) {
      // type: 'ok' | 'error'
      toastEl.textContent = message;
      toastEl.className   = 'footer-notification show' + (type ? ' ' + type : '');
      // Haptic
      if (tg) {
        if (type === 'ok')    tg.HapticFeedback?.notificationOccurred('success');
        if (type === 'error') tg.HapticFeedback?.notificationOccurred('error');
      }
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration || 2600);
    }

    // ── Status bar — green (ok) | red (error) | neutral ──────
    function setStatus(kind, message) {
      // kind: 'ok' | 'error' | ''
      statusEl.className  = kind || '';
      statusEl.textContent = message;
    }

    // ── Helpers (unchanged) ───────────────────────────────────
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function isValidWebhookUrl(url) {
      if (!url) return false;
      try { return new URL(url).protocol === 'https:'; } catch { return false; }
    }

    // ── SVGs ─────────────────────────────────────────────────
    const SVG_CH   = '<svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
    const SVG_DONE = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';

    // ── Render channels ───────────────────────────────────────
    function renderChannels(channels) {
      listEl.innerHTML = '';
      if (!channels.length) {
        listEl.innerHTML = '<div style="padding:14px;text-align:center;color:var(--hint);font-size:13px">No channels received from webhook.</div>';
        return;
      }

      channels.forEach((ch, idx) => {
        const title  = ch.channel || ch.title || ch.id || ('Channel ' + (idx + 1));
        const joined = Boolean(ch.joined);

        const row = document.createElement('article');
        row.className = 'channel';

        const avatar = document.createElement('div');
        avatar.className = 'ch-avatar';
        avatar.innerHTML = SVG_CH;

        const info = document.createElement('div');
        info.className = 'ch-info';
        info.innerHTML =
          '<div class="channel-title">' + escapeHtml(title) + '</div>' +
          '<span class="badge ' + (joined ? 'ok' : 'error') + '">' +
            (joined ? '✓ Joined' : '✗ Not joined') +
          '</span>';

        row.appendChild(avatar);
        row.appendChild(info);

        if (joined) {
          // Joined pill button
          const doneBtn = document.createElement('button');
          doneBtn.className = 'join-btn joined-btn';
          doneBtn.disabled  = true;
          doneBtn.innerHTML = SVG_DONE + ' Joined';
          row.appendChild(doneBtn);
        } else if (ch.link) {
          // Join button
          const btn = document.createElement('button');
          btn.className = 'join-btn';
          btn.textContent = 'Join';
          btn.onclick = () => {
            tg?.HapticFeedback?.impactOccurred('light');
            if (tg) tg.openTelegramLink(ch.link);
            else window.open(ch.link, '_blank');
            btn.disabled = true;
            btn.innerHTML = '<span class="btn-spinner"></span>';
            // Reset if user comes back without joining
            setTimeout(() => {
              if (btn.disabled && !btn.classList.contains('joined-btn')) {
                btn.innerHTML = 'Join';
                btn.disabled  = false;
              }
            }, 4000);
          };
          row.appendChild(btn);
        }

        listEl.appendChild(row);
      });
    }

    // ── Fetch with timeout (unchanged) ───────────────────────
    async function fetchWithTimeout(url, options, ms) {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), ms);
      try { return await fetch(url, { ...options, signal: ctrl.signal }); }
      finally { clearTimeout(timer); }
    }

    // ── Main check ────────────────────────────────────────────
    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing webhook URL.');
        showNotification('Missing ?check= webhook URL', 'error');
        return;
      }

      try {
        setStatus('', 'Verifying memberships…');
        tg?.HapticFeedback?.impactOccurred('medium');

        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now());

        const resp = await fetchWithTimeout(url.toString(), {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            initData: tg?.initData || null,
            platform: tg?.platform || null
          })
        }, 12000);

        const data = await resp.json();
        if (!resp.ok || !data?.ok) throw new Error(data?.error || 'Webhook error');

        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);

        if (data.joined) {
          setStatus('ok', '✅ All channels joined! Closing…');
          subtitleEl.textContent = 'Verification complete. Returning to bot.';
          showNotification('All channels verified!', 'ok', 2000);
          tg?.MainButton?.setText('Verified ✓');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          setTimeout(() => tg?.close(), 1600);
          return;
        }

        // Pending — use red (not yellow)
        setStatus('error', 'Join missing channels then tap Re-check.');
        subtitleEl.textContent = 'Join all required channels above and re-check.';
        showNotification('Please join pending channels', 'error');
        tg?.MainButton?.setText('Re-check');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();

      } catch (err) {
        const isAbort = err?.name === 'AbortError';
        const msg     = isAbort ? 'Webhook timeout — tap Retry' : err.message;
        setStatus('error', msg);
        subtitleEl.textContent = 'Check BB WebApp.render response format.';
        showNotification(isAbort ? 'Request timed out' : err.message, 'error');
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      }
    }

    // ── Boot ─────────────────────────────────────────────────
    if (!tg) {
      setStatus('error', 'Telegram WebApp SDK not found.');
      showNotification('Open from Telegram bot', 'error');
    } else {
      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(runCheck);
      runCheck();
    }
  </script>
</body>
</html>
