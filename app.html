<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>

  <style>

    /* ─── Reset tap highlight on all interactive elements ─── */
    .join-btn,
.tgme_action_button_new {
  -webkit-tap-highlight-color: rgba(36, 129, 204, 0.35);
  outline: none !important;
  user-select: none;
}

    /* ─── Join button ─── */
    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      min-width: 74px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent-btn-color);
      color: #fff !important;
      text-decoration: none !important;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
      border: 0;
      cursor: pointer;
      box-shadow: none !important;
      background-image: none !important;
      transition: opacity .15s ease;
    }
    .join-btn:hover  { opacity: .88; }
    .join-btn:active,
    .join-btn:focus  { outline: none !important; box-shadow: none !important; }
    .join-btn.is-loading { pointer-events: none; opacity: .92; }
    .join-btn.done   { pointer-events: none; opacity: .72; cursor: default; }

    /* ─── Spinners ─── */
    .join-spinner {
      width: 14px; height: 14px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .cont-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SVG status icon in join-btn ─── */
    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      flex-shrink: 0;
      line-height: 0;
    }
    .status-icon svg { width: 22px !important; height: 22px !important; display: block; }

    /* ─── JOIN loading content ─── */
    .join-load {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    /* ─── CONTINUE BUTTON ───────────────────────────────────────────
       We override the telegram.css .tgme_action_button_new to make it
       bigger. The original is around 42px tall. We push it to 54px.
       We keep the class for the gradient/shine, just override sizing.
    ─────────────────────────────────────────────────────────────── */
    .tgme_action_button_new.continue-btn {
      /* override telegram.css defaults */
      height: 54px !important;
      line-height: 54px !important;
      font-size: 17px !important;
      font-weight: 700 !important;
      padding: 0 32px !important;
      border-radius: 999px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 10px !important;
      /* locked = same dim style as join done */
      transition: opacity .15s ease;
    }
    .tgme_action_button_new.continue-btn.locked {
      opacity: 0.45 !important;
      pointer-events: none !important;
      cursor: default !important;
    }
    .tgme_action_button_new.continue-btn.is-loading {
      pointer-events: none !important;
      opacity: .92 !important;
    }
    .tgme_action_button_new.continue-btn:active,
    .tgme_action_button_new.continue-btn:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    /* Continue SVG icon */
    .cont-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      flex-shrink: 0;
      line-height: 0;
    }
    .cont-icon svg { width: 26px !important; height: 26px !important; display: block; }

    /* Continue button wrapper */
    .continue-wrap {
      width: 100%;
      max-width: 340px;
      margin: -8px auto 0;   /* pull up to cancel tgme_body_wrap bottom spacing */
      padding: 0 16px 16px;
      box-sizing: border-box;
    }
    /* make the anchor fill the wrapper */
    .continue-wrap .tgme_action_button_new.continue-btn {
      width: 100%;
      box-sizing: border-box;
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
      padding: 0;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      z-index: 9999;
      transition: opacity .22s ease, transform .22s ease;
      line-height: 1;
      overflow: hidden;
      /* Fix alignment issues: ensure consistent vertical rhythm */
      vertical-align: middle;
    }
    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: #3dbb6e; }
    #toast.error   { background: #e5534b; }

    /* Toast icon container — perfect vertical/horizontal centering */
    #toast-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      padding-left: 12px;
      box-sizing: border-box;
      line-height: 0;
      font-size: 0;
      /* ensure SVG vertical centering inside flex */
      vertical-align: middle;
    }
    /* Force SVG inside toast-icon to be perfectly centered */
    #toast-icon svg {
      display: block !important;
      width: 20px !important;
      height: 20px !important;
      margin: 0 auto;
      flex-shrink: 0;
      /* remove any extra spacing */
      vertical-align: middle;
    }
    /* Toast message - proper baseline alignment with the icon */
    #toast-msg {
      line-height: 1.2;
      flex-shrink: 0;
      padding: 10px 18px 10px 8px;
      display: inline-block;
      vertical-align: middle;
      /* ensure text doesn't wrap unintentionally */
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ─── Channel rows ─── */
    .channel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }
    .channel-row:first-child { padding-top: 8px; }
    .channel-row:last-child  { padding-bottom: 8px; }

    .channel-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .channel-name {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.1;
      color: var(--tme-logo-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-divider {
      width: 100%;
      height: 1px;
      background: rgba(127,127,127,.18);
    }

    /* Channel circle icons */
    .mini-icon-box {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 36px;
      overflow: hidden;
    }
    .mini-icon-box svg { width: 26px !important; height: 26px !important; display: block; }

    /* ─── Footer note ─── */
    .footer-note {
      margin-top: 8px;
      padding-bottom: 2px;
      font-size: 13.5px;
      line-height: 1.35;
      color: rgba(127,127,127,.95);
      text-align: center;
    }

    /* ─── Main header icon ─── */
    .main-icon-wrap {
      width: 72px; height: 72px;
      margin-bottom: 10px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* ─── Header title ─── */
    .header-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--tme-logo-color);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-btn-color);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Additional safeguard for any SVG inside the app */
    svg {
      vertical-align: middle;
    }

    /* Ensure responsive toast on small screens still perfect */
    @media (max-width: 460px) {
      #toast-msg {
        padding: 9px 16px 9px 6px;
        font-size: 13px;
      }
      #toast-icon {
        width: 36px;
        flex: 0 0 36px;
        padding-left: 10px;
      }
      #toast-icon svg {
        width: 18px !important;
        height: 18px !important;
      }
    }
  </style>
</head>

      </div>
    </div>

    <!-- CONTINUE BUTTON — same outer structure as tgme_page_action -->
    <div class="continue-wrap">
      <a id="continue-btn" class="tgme_action_button_new shine continue-btn locked" href="#" onclick="return continueBot(this)"></a>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast">
    <span id="toast-icon"></span>
    <span id="toast-msg"></span>
  </div>

  <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>

  <script>
    // ── Init ──
    var tg = window.Telegram && window.Telegram.WebApp;
    if (tg) { tg.ready(); tg.expand(); }

    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }

    // ── Haptic ──
    function haptic(type) {
      try { if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred(type); } catch(e){}
    }

    // ── SVGs ──
    var SVG_SUCCESS = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="sc2"><rect width="512" height="512"/></clipPath><clipPath id="sc3"><path d="M0,0 L100,0 L100,100 L0,100z"/></clipPath></defs><g clip-path="url(#sc2)"><g clip-path="url(#sc3)" transform="matrix(5.12,0,0,5.12,0,0)"><g><g><path fill="#fff" d="M67.85,39.525c-1.31-1.31-3.445-1.365-4.82-.124l-.13.124-18.962,18.963-7.4-7.4c-1.358-1.358-3.592-1.358-4.95,0-1.358,1.358-1.358,3.593,0,4.95l9.167,9.168.169.16c1.768,1.594 4.511,1.523 6.195-.16l20.73-20.731.125-.13c1.24-1.376 1.185-3.51-.124-4.82zM50,14.545c19.581,0 35.456,15.874 35.456,35.455s-15.875,35.456-35.456,35.456-35.455-15.875-35.455-35.456 15.874-35.455 35.455-35.455z"/></g></g></g></g></svg>';

    var SVG_ERROR = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="ec2"><rect width="512" height="512"/></clipPath><clipPath id="ec3"><path d="M0,0 L101,0 L101,100 L0,100z"/></clipPath></defs><g clip-path="url(#ec2)"><g clip-path="url(#ec3)" transform="matrix(5.069,0,0,5.069,0,2.535)"><g><g><path fill="#fff" d="M66.412,33.838c-1.358-1.358-3.592-1.358-4.95,0l-11.212,11.212-11.213-11.212c-1.358-1.358-3.592-1.358-4.95,0-1.358,1.357-1.358,3.592,0,4.95l11.215,11.212-11.214,11.213c-1.358,1.358-1.358,3.592,0,4.95 1.358,1.358 3.592,1.358 4.95,0l11.212-11.212 11.213,11.212.13.124c1.376,1.239 3.509,1.183 4.818-.126 1.31-1.309 1.365-3.442.126-4.818l-.124-.13-11.212-11.213 11.213-11.213c1.358-1.358 1.358-3.592,0-4.95zM50.25,14.545c19.581,0 35.456,15.874 35.456,35.455s-15.875,35.456-35.456,35.456-35.455-15.875-35.455-35.456 15.874-35.455 35.455-35.455z"/></g></g></g></g></svg>';

    var SVG_CONTINUE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="cnc2"><rect width="512" height="512"/></clipPath><clipPath id="cnc3"><path d="M0,0 L101,0 L101,100 L0,100z"/></clipPath></defs><g clip-path="url(#cnc2)"><g clip-path="url(#cnc3)" transform="matrix(5.069,0,0,5.069,0,2.535)"><g><g><path fill-rule="evenodd" fill="#fff" d="M40.889,34.352c.997-5.655 6.39-9.431 12.045-8.434 5.655.997 9.43,6.39 8.434,12.045l-1.136,6.438c.114.028.223.06.329.095 1.789.597 3.196,2.004 3.793,3.793.308.924.308,2.069.308,4.358v6.143c0,2.29,0,3.434-.308,4.358-.597,1.789-2.004,3.196-3.793,3.793-.924.308-2.07.308-4.359.308h-11.517c-2.29,0-3.435,0-4.36-.308-1.788-.597-3.195-2.005-3.792-3.793-.308-.925-.308-2.07-.308-4.358v-6.143c0-2.29,0-3.434.308-4.358.597-1.789 2.004-3.197 3.793-3.794.924-.308 2.069-.308 4.359-.308h10.407l1.253-7.069c.505-2.862-1.435-5.632-4.297-6.137-2.862-.505-5.632,1.435-6.137,4.297l-.443,2.515c-.243,1.378-1.577,2.312-2.955,2.069-1.377-.243-2.311-1.577-2.068-2.955l.444-2.515zM85.279,47.77c0-17.408-15.61-31.52-34.866-31.52-19.257,0-34.867,14.112-34.867,31.52 0,8.297 3.547,15.846 9.345,21.475.22,3.494-1.85,7.765-4.443,10.652l-.059.075c-.373.538-.059,1.308.583,1.433 2.202.365 6.105-.3 8.45-1.453l.386-.185c1.22-.58 3.292-1.562 5.158-3.722 4.656,2.083 9.9,3.254 15.447,3.254 19.256,0 34.866-14.112 34.866-31.52z"/></g></g></g></g></svg>';

    // ── Render continue button initial state ──
    function renderContinueNormal() {
      var btn = document.getElementById('continue-btn');
      btn.innerHTML = '<span class="cont-icon">' + SVG_CONTINUE + '</span>Continue';
    }
    renderContinueNormal();

    // ── Channel tracking ──
    var TOTAL = document.querySelectorAll('.join-btn').length;
    var joined = 0;

    function checkAllJoined() {
      if (joined >= TOTAL) {
        document.getElementById('continue-btn').classList.remove('locked');
      }
    }

    // ── Toast (fixed alignment) ──
    var toastTimer;
    function showToast(type, msg) {
      var el  = document.getElementById('toast');
      var ico = document.getElementById('toast-icon');
      var txt = document.getElementById('toast-msg');
      clearTimeout(toastTimer);
      el.classList.remove('show');
      el.className = type;
      // Set SVG — now uses inline-flex and proper centering
      ico.innerHTML = type === 'success' ? SVG_SUCCESS : SVG_ERROR;
      txt.textContent = msg;
      // force reflow
      void el.offsetWidth;
      el.classList.add('show');
      haptic(type);
      toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2800);
    }

    // ── Join logic with same experience ──
    function startJoin(btn) {
      if (!btn || btn.classList.contains('is-loading') || btn.classList.contains('done')) return false;

      var name = btn.closest('.channel-row').querySelector('.channel-name').textContent.trim();

      btn.classList.add('is-loading');
      btn.innerHTML = '<span class="join-load"><span class="join-spinner"></span>Joining</span>';

      setTimeout(function(){
        btn.classList.remove('is-loading');
        var ok = Math.random() > 0.3;
        if (ok) {
          btn.classList.add('done');
          btn.innerHTML = '<span class="status-icon">' + SVG_SUCCESS + '</span>';
          joined++;
          checkAllJoined();
          showToast('success', 'Joined ' + name);
        } else {
          btn.style.opacity = '0.72';
          btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
          showToast('error', 'Failed to join ' + name);
          setTimeout(function(){
            btn.style.opacity = '';
            btn.innerHTML = 'Join';
          }, 1600);
        }
      }, 1500);

      return false;
    }

    // ── Continue with no external changes ──
    function continueBot(btn) {
      if (!btn || btn.classList.contains('is-loading') || btn.classList.contains('locked')) return false;

      btn.classList.add('is-loading');
      btn.innerHTML = '<span class="cont-spinner"></span>Continuing';

      setTimeout(function(){
        if (tg) {
          tg.close();
        } else {
          btn.classList.remove('is-loading');
          renderContinueNormal();
        }
      }, 1000);

      return false;
    }

    document.body.classList.remove('no_transition');
  </script>

</body>
</html>
