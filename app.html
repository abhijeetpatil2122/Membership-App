<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Telegram SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Telegram Fonts & CSS -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <!-- Dark mode support -->
  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>

  <style>
    .join-btn,
    .continue-btn {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
      box-shadow: none !important;
      user-select: none;
      -webkit-appearance: none;
      appearance: none;
      background-image: none !important;
    }

    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      min-width: 74px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent-btn-color);
      color: #fff !important;
      text-decoration: none !important;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
      border: 0;
      cursor: pointer;
      transition: opacity .15s ease;  /* no transform — no lift */
    }

    .join-btn:hover { opacity: .88; }
    .continue-btn:hover { opacity: .92; }

    .join-btn:focus,
    .join-btn:active,
    .continue-btn:focus,
    .continue-btn:active {
      outline: none !important;
      box-shadow: none !important;
      background-image: none !important;
      transform: none !important;     /* lock — no movement on tap */
    }

    .join-btn.is-loading,
    .continue-btn.is-loading {
      pointer-events: none;
      opacity: .92;
    }

    /* ── Toast notification ── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      display: inline-flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 7px;
      padding: 9px 16px 9px 12px;
      border-radius: 999px;
      font-size: 13.5px;
      font-weight: 600;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s ease, transform .22s ease;
      z-index: 9999;
      max-width: calc(100vw - 32px);
      box-sizing: border-box;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.success { background: #3dbb6e; }
    #toast.error   { background: #e5534b; }

    #toast-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #toast-msg {
      white-space: nowrap;
      line-height: 1.2;
    }

    /* SVG status icons inside join-btn */
    .join-btn .status-icon {
      width: 20px;
      height: 20px;
      flex: 0 0 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Continue button locked state */
    .continue-btn.locked {
      opacity: 0.45;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Continue SVG icon */
    .continue-icon {
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .continue-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.45);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .channel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }

    .channel-row:first-child {
      padding-top: 8px;
    }

    .channel-row:last-child {
      padding-bottom: 8px;
    }

    .channel-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .channel-name {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.1;
      color: var(--tme-logo-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-divider {
      width: 100%;
      height: 1px;
      background: rgba(127, 127, 127, 0.18);
    }

    .mini-icon-box {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      overflow: hidden;
    }

    .footer-note {
      margin-top: 8px;
      padding-bottom: 2px;
      font-size: 13.5px;
      line-height: 1.35;
      color: rgba(127, 127, 127, 0.95);
      text-align: center;
    }

    /* ── Continue button ── */
    .continue-wrap {
      width: 100%;
      max-width: 340px;
      margin: 0 auto;            /* no extra top gap — sits right under footer-note */
      padding: 8px 16px 16px;
      box-sizing: border-box;
    }

    .continue-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 58px;              /* noticeably bigger */
      border-radius: 999px;
      background: var(--accent-btn-color);
      color: #fff !important;
      font-size: 18px;           /* bigger text to match height */
      font-weight: 700;
      text-decoration: none !important;
      border: 0;
      box-shadow: none;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: opacity .15s ease;   /* no transform — no lift */
      padding: 0;
      line-height: 1;
      transform: none !important;      /* ensure no movement */
    }

    /* Telegram-like shine */
    .shine::before {
      content: "";
      position: absolute;
      top: -40%;
      left: -55%;
      width: 40%;
      height: 180%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.30), transparent);
      transform: skewX(-20deg);
      animation: shineMove 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shineMove {
      0%   { left: -55%; }
      55%  { left: 120%; }
      100% { left: 120%; }
    }

    .continue-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      z-index: 1;
      width: 100%;
      text-align: center;
    }

    .join-loading-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    .continue-loading-content {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
    }

    /* ── Main header icon: smaller circle, icon fits better ── */
    .main-icon-wrap {
      width: 72px;               /* was 96px */
      height: 72px;
      margin-bottom: 10px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* ── Header title ── */
    .header-title {
      font-size: 22px;           /* was 28px — tighter, cleaner */
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--tme-logo-color);
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .header-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-btn-color);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
  </style>
</head>

    // ── Channel join tracking ──
    var TOTAL_CHANNELS = document.querySelectorAll('.join-btn').length;
    var joinedCount = 0;

    // Inject continue icon on load
    document.getElementById('continue-icon').innerHTML = SVG_CONTINUE;

    function checkAllJoined() {
      if (joinedCount >= TOTAL_CHANNELS) {
        document.querySelector('.continue-btn').classList.remove('locked');
      }
    }

    // ── Toast ──
    var toastTimer;
    function showToast(type, msg) {
      var el = document.getElementById('toast');
      var iconEl = document.getElementById('toast-icon');
      var msgEl = document.getElementById('toast-msg');
      clearTimeout(toastTimer);
      // Reset fully before setting new class to re-trigger transition
      el.className = '';
      void el.offsetWidth;
      el.className = type + ' show';
      iconEl.innerHTML = type === 'success' ? SVG_SUCCESS : SVG_ERROR;
      msgEl.textContent = msg;
      toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
    }

    function startJoin(btn) {
      if (!btn || btn.classList.contains('is-loading')) return false;

      var channelName = btn.closest('.channel-row')
                           .querySelector('.channel-name')
                           .textContent.trim();

      btn.classList.add('is-loading');
      btn.innerHTML = '<span class="join-loading-content"><span class="join-spinner"></span><span>Joining</span></span>';

      setTimeout(function () {
        var ok = Math.random() > 0.3;
        btn.classList.remove('is-loading');
        if (ok) {
          btn.innerHTML = '<span class="status-icon">' + SVG_SUCCESS + '</span>';
          btn.style.pointerEvents = 'none';
          btn.style.opacity = '0.72';
          joinedCount++;
          checkAllJoined();
          showToast('success', 'Joined ' + channelName);
        } else {
          // Show error icon briefly, then restore "Join" so user can retry
          btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
          btn.style.opacity = '0.72';
          showToast('error', 'Failed to join ' + channelName);
          setTimeout(function() {
            btn.style.opacity = '';
            btn.innerHTML = 'Join';
          }, 1600);
        }
      }, 1500);

      return false;
    }

    function continueBot(btn) {
      if (!btn || btn.classList.contains('is-loading') || btn.classList.contains('locked')) return false;

      btn.classList.add('is-loading');
      btn.innerHTML = '<span class="continue-loading-content"><span class="continue-spinner"></span><span>Continuing</span></span>';

      setTimeout(function () {
        if (tg) {
          tg.close();
        } else {
          btn.classList.remove('is-loading');
          btn.innerHTML = '<span class="continue-content"><span class="continue-icon" id="continue-icon">' + SVG_CONTINUE + '</span>Continue</span>';
        }
      }, 1000);

      return false;
    }

    document.body.classList.remove('no_transition');
  </script>

</body>
</html>
