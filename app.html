<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Join to Access</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <!-- TWallpaper CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/twallpaper@latest/css/index.css">
  <script src="https://cdn.jsdelivr.net/npm/twallpaper@latest/dist/index.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      position: relative;
      background: var(--tg-theme-bg-color, #ffffff);
    }

    /* TWallpaper Container */
    .tw-wallpaper-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 0;
    }

    /* Content Layer */
    .page {
      position: relative;
      z-index: 1;
      max-width: 500px;
      margin: 0 auto;
      padding: 0 16px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(0px);
    }

    /* Header - Telegram Style */
    .tg-header {
      padding: 12px 0 20px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 0.5px solid var(--tg-theme-section-separator-color, rgba(0, 0, 0, 0.1));
      margin-bottom: 24px;
      background: transparent;
    }

    .tg-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--tg-theme-button-color, #2481cc), #1a6baa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }

    .tg-header-badge {
      font-size: 13px;
      font-weight: 500;
      padding: 4px 12px;
      background: var(--tg-theme-secondary-bg-color, rgba(0, 0, 0, 0.05));
      backdrop-filter: blur(10px);
      border-radius: 20px;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    /* Main Card - Solid like Telegram Web */
    .tg-card {
      background: var(--tg-theme-bg-color, #ffffff);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* Channel List Header */
    .tg-card-header {
      padding: 20px 20px 16px;
      text-align: center;
      border-bottom: 0.5px solid var(--tg-theme-section-separator-color, rgba(0, 0, 0, 0.1));
    }

    .tg-icon-circle {
      width: 64px;
      height: 64px;
      background: var(--tg-theme-button-color, #2481cc);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      box-shadow: 0 2px 8px rgba(36, 129, 204, 0.3);
    }

    .tg-icon-circle svg {
      width: 32px;
      height: 32px;
      fill: white;
    }

    .tg-card-header h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--tg-theme-text-color, #000000);
    }

    .tg-card-header p {
      font-size: 14px;
      color: var(--tg-theme-hint-color, #8e8e93);
      line-height: 1.4;
    }

    /* Channel Items */
    .channel-item {
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      margin: 0 12px 12px 12px;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: transform 0.1s ease;
    }

    .channel-avatar {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--tg-theme-button-color, #2481cc), #1a6baa);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .channel-avatar svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .channel-info {
      flex: 1;
    }

    .channel-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--tg-theme-text-color, #000000);
    }

    .channel-username {
      font-size: 13px;
      color: var(--tg-theme-hint-color, #8e8e93);
    }

    .channel-status {
      flex-shrink: 0;
    }

    /* Telegram Style Buttons - Proper alignment */
    .tg-button-group {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tg-button {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.1s ease;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-button-color, #2481cc);
      border: 1px solid var(--tg-theme-button-color, #2481cc);
      white-space: nowrap;
    }

    .tg-button-primary {
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
    }

    .tg-button-success {
      background: #34c759;
      color: white;
      border: none;
      opacity: 0.8;
      cursor: default;
    }

    .tg-button-loading {
      background: var(--tg-theme-secondary-bg-color, #f0f0f0);
      color: var(--tg-theme-hint-color, #8e8e93);
      border: 1px solid var(--tg-theme-section-separator-color, rgba(0, 0, 0, 0.1));
      cursor: default;
      pointer-events: none;
    }

    .tg-button:active:not(:disabled):not(.tg-button-success) {
      transform: scale(0.97);
      opacity: 0.8;
    }

    .tg-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Continue Button */
    .tg-continue-btn {
      width: calc(100% - 32px);
      margin: 0 16px 16px 16px;
      padding: 14px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #ffffff);
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .tg-continue-btn:active:not(:disabled) {
      transform: scale(0.98);
      opacity: 0.9;
    }

    .tg-continue-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .spinner-dark {
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: var(--tg-theme-button-color, #2481cc);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .tg-toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      color: white;
      padding: 10px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tg-toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Footer Note */
    .tg-footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--tg-theme-hint-color, #8e8e93);
      padding: 20px 16px 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<!-- TWallpaper Container -->
<div id="twallpaper" class="tw-wallpaper-container"></div>

<div class="page">
  
  <!-- Header -->
  <div class="tg-header">
    <h1>Telegram</h1>
    <span class="tg-header-badge">Bot Access</span>
  </div>

  <!-- Main Card -->
  <div class="tg-card">
    <div class="tg-card-header">
      <div class="tg-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="white" fill="none"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="white" fill="none"/>
        </svg>
      </div>
      <h2>Join to Continue</h2>
      <p>Subscribe to our channels to access this bot</p>
    </div>

    <!-- Channel List Container -->
    <div id="channelsContainer"></div>
  </div>

  <!-- Continue Button -->
  <button class="tg-continue-btn" id="continueBtn" disabled onclick="handleContinue()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M5 12h14M12 5l7 7-7 7"/>
    </svg>
    Continue to Bot
  </button>

  <div class="tg-footer-note">
    You need to join all channels above to continue
  </div>
</div>

<div id="toast" class="tg-toast"></div>

<script>
// Initialize TWallpaper with official Telegram colors
const container = document.getElementById('twallpaper');
const wallpaper = new TWallpaper(container, {
  colors: [
    '#dbddbb',  // Telegram light green
    '#6ba587',  // Muted green
    '#c8dac2',  // Soft sage
    '#88b884'   // Leaf green
  ],
  tails: 90,
  fps: 30,
  animate: true,
  scrollAnimate: false,
  pattern: {
    image: 'https://telegram.org/img/tgpattern.png', // Official Telegram pattern
    mask: false,
    size: 'auto',
    blur: 0,
    opacity: 0.15
  }
});
wallpaper.init();

// Initialize Telegram WebApp
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  
  // Apply theme colors
  const root = document.documentElement;
  const theme = tg.themeParams;
  if (theme) {
    root.style.setProperty('--tg-theme-bg-color', theme.bg_color || '#ffffff');
    root.style.setProperty('--tg-theme-text-color', theme.text_color || '#000000');
    root.style.setProperty('--tg-theme-hint-color', theme.hint_color || '#8e8e93');
    root.style.setProperty('--tg-theme-button-color', theme.button_color || '#2481cc');
    root.style.setProperty('--tg-theme-button-text-color', theme.button_text_color || '#ffffff');
    root.style.setProperty('--tg-theme-secondary-bg-color', theme.secondary_bg_color || '#f5f5f5');
    root.style.setProperty('--tg-theme-section-separator-color', theme.section_separator_color || 'rgba(0,0,0,0.1)');
  }
}

// Channel Configuration
const CHANNELS = [
  {
    id: 'paradox_main',
    name: 'Paradox Channel',
    username: '@ParadoxCh',
    link: 'https://t.me/ParadoxBackup',
    icon: 'M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83'
  },
  {
    id: 'paradox_updates',
    name: 'Paradox Updates',
    username: '@ParadoxUpdates',
    link: 'https://t.me/ParadoxBackup',
    icon: 'M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.66 0 3-4 3-9s-1.34-9-3-9m0 18c-1.66 0-3-4-3-9s1.34-9 3-9'
  }
];

// State management
const state = {};

CHANNELS.forEach(channel => {
  state[channel.id] = {
    joined: false,
    checking: false
  };
});

// Render channels
function renderChannels() {
  const container = document.getElementById('channelsContainer');
  container.innerHTML = '';
  
  CHANNELS.forEach((channel) => {
    const channelState = state[channel.id];
    const channelDiv = document.createElement('div');
    channelDiv.className = 'channel-item';
    
    // Avatar
    const avatar = document.createElement('div');
    avatar.className = 'channel-avatar';
    avatar.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="${channel.icon}"/></svg>`;
    
    // Info
    const info = document.createElement('div');
    info.className = 'channel-info';
    info.innerHTML = `
      <div class="channel-name">${channel.name}</div>
      <div class="channel-username">${channel.username}</div>
    `;
    
    // Status buttons
    const statusDiv = document.createElement('div');
    statusDiv.className = 'channel-status';
    
    if (channelState.joined) {
      statusDiv.innerHTML = `
        <div class="tg-button-group">
          <button class="tg-button tg-button-success" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Joined
          </button>
        </div>
      `;
    } else if (channelState.checking) {
      statusDiv.innerHTML = `
        <div class="tg-button-group">
          <button class="tg-button tg-button-loading" disabled>
            <div class="spinner spinner-dark"></div>
            Checking...
          </button>
        </div>
      `;
    } else {
      statusDiv.innerHTML = `
        <div class="tg-button-group">
          <button class="tg-button" onclick="joinChannel('${channel.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
            Join
          </button>
          <button class="tg-button tg-button-primary" onclick="verifyChannel('${channel.id}')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            Verify
          </button>
        </div>
      `;
    }
    
    channelDiv.appendChild(avatar);
    channelDiv.appendChild(info);
    channelDiv.appendChild(statusDiv);
    container.appendChild(channelDiv);
  });
}

// Join channel
function joinChannel(channelId) {
  const channel = CHANNELS.find(c => c.id === channelId);
  if (channel && tg) {
    tg.openTelegramLink(channel.link);
    showToast(`Opening ${channel.name}...`, 'info');
  } else if (channel) {
    window.open(channel.link, '_blank');
    showToast(`Please join ${channel.name}`, 'info');
  }
}

// Verify channel membership
async function verifyChannel(channelId) {
  const channelState = state[channelId];
  if (channelState.checking) return;
  
  channelState.checking = true;
  renderChannels();
  
  // Simulate API call (replace with actual backend verification)
  setTimeout(() => {
    // In production, replace this with actual API call
    const isMember = true; // Demo: always successful
    
    if (isMember) {
      channelState.joined = true;
      channelState.checking = false;
      showToast(`✓ Verified ${CHANNELS.find(c => c.id === channelId).name}!`, 'success');
      if (tg) tg.HapticFeedback?.notificationOccurred('success');
    } else {
      channelState.checking = false;
      showToast(`Please join ${CHANNELS.find(c => c.id === channelId).name} first`, 'error');
      if (tg) tg.HapticFeedback?.notificationOccurred('error');
    }
    
    renderChannels();
    updateContinueButton();
  }, 1500);
}

// Update continue button state
function updateContinueButton() {
  const allJoined = CHANNELS.every(channel => state[channel.id].joined);
  const continueBtn = document.getElementById('continueBtn');
  
  if (continueBtn) {
    continueBtn.disabled = !allJoined;
    if (allJoined) {
      showToast('All channels verified! You can continue now.', 'success');
    }
  }
}

// Handle continue
function handleContinue() {
  const allJoined = CHANNELS.every(channel => state[channel.id].joined);
  
  if (allJoined) {
    if (tg) {
      tg.sendData(JSON.stringify({
        event: 'access_granted',
        channels: CHANNELS.map(c => c.id),
        timestamp: Date.now()
      }));
      tg.close();
    } else {
      showToast('Access granted! Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = '/bot';
      }, 1000);
    }
  } else {
    showToast('Please verify all channels first', 'error');
  }
}

// Toast notification
let toastTimeout;
function showToast(message, type = 'info') {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.classList.add('show');
  
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Initialize
renderChannels();

// Update main button state
function checkAllVerified() {
  const allJoined = CHANNELS.every(channel => state[channel.id].joined);
  const continueBtn = document.getElementById('continueBtn');
  if (continueBtn) continueBtn.disabled = !allJoined;
}

// Check periodically for verification completion
setInterval(checkAllVerified, 500);
</script>
</body>
</html>
