<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Channel Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches&&document.documentElement&&document.documentElement.classList&&document.documentElement.classList.add('theme_dark');</script>

    <link rel="icon" type="image/svg+xml" href="//telegram.org/img/website_icon.svg?4">
    <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet" type="text/css">
    <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
    <link href="//telegram.org/css/telegram.css?249" rel="stylesheet" media="screen">

    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
      /* ── Channel row inside .tgme_page ─────────────────────
         Styled to blend naturally with Telegram's own page look
      ──────────────────────────────────────────────────────── */
      .cv-channel-row {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.06);
      }
      .theme_dark .cv-channel-row {
        border-bottom-color: rgba(255,255,255,0.06);
      }
      .cv-channel-row:last-of-type {
        border-bottom: none;
        margin-bottom: 4px;
      }

      /* Avatar circle */
      .cv-avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: var(--accent-btn-color, #3390ec);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .cv-avatar svg { fill: #fff; width: 24px; height: 24px; }

      /* Name + handle */
      .cv-meta { flex: 1; min-width: 0; text-align: left; }
      .cv-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--tgme-color, #000);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.3;
      }
      .theme_dark .cv-name { color: #fff; }
      .cv-handle {
        font-size: 13px;
        color: #999;
        margin-top: 2px;
      }

      /* Badge shown after verify */
      .cv-verified-badge {
        flex-shrink: 0;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: #e8f5e9;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transform: scale(0.5);
        transition: opacity .25s, transform .3s cubic-bezier(.34,1.56,.64,1);
        pointer-events: none;
      }
      .cv-verified-badge.show {
        opacity: 1;
        transform: scale(1);
      }
      .cv-verified-badge svg { fill: #43a047; width: 14px; height: 14px; }

      /* Two small buttons per row */
      .cv-btns {
        display: flex;
        gap: 7px;
        flex-shrink: 0;
      }
      .cv-btn {
        border: none;
        border-radius: 8px;
        padding: 8px 14px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
        transition: opacity .15s;
      }
      .cv-btn:active { opacity: .7; }
      .cv-btn:disabled { cursor: default; }

      .cv-btn-join {
        background: var(--accent-btn-color, #3390ec);
        color: #fff;
      }
      .cv-btn-join.done {
        background: rgba(67,160,71,0.14);
        color: #43a047;
      }
      .cv-btn-join:disabled { opacity: .55; }

      .cv-btn-verify {
        background: rgba(0,0,0,0.06);
        color: #555;
      }
      .theme_dark .cv-btn-verify {
        background: rgba(255,255,255,0.08);
        color: #ccc;
      }
      .cv-btn-verify.done {
        background: rgba(67,160,71,0.14);
        color: #43a047;
      }
      .cv-btn-verify:disabled:not(.done) { opacity: .4; }

      /* Spinner */
      .cv-spinner {
        display: inline-block;
        width: 11px;
        height: 11px;
        border: 2px solid rgba(0,0,0,0.12);
        border-top-color: var(--accent-btn-color, #3390ec);
        border-radius: 50%;
        animation: cv-spin .65s linear infinite;
      }
      .theme_dark .cv-spinner {
        border-color: rgba(255,255,255,0.15);
        border-top-color: var(--accent-btn-color, #3390ec);
      }
      @keyframes cv-spin { to { transform: rotate(360deg); } }

      /* Footer note — reuses tgme_page_additional style */
      .cv-footer {
        margin-top: 14px !important;
        font-size: 13px;
        color: #888;
        line-height: 1.5;
      }

      /* ── Toast ──────────────────────────────────────────── */
      .cv-toast {
        position: fixed;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        padding: 10px 20px;
        border-radius: 20px;
        font-size: 13.5px;
        font-weight: 500;
        color: #fff;
        white-space: nowrap;
        z-index: 9999;
        pointer-events: none;
        opacity: 0;
        transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .2s;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
      }
      .cv-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      .cv-toast.success { background: #43a047; }
      .cv-toast.error   { background: #e53935; }
      .cv-toast.info    { background: #1e88e5; }
    </style>
  </head>

  <body class="no_transition">

    <!-- Background wallpaper (UNCHANGED) -->
    <div class="tgme_background_wrap">
      <canvas id="tgme_background" class="tgme_background default" width="50" height="50" data-colors="dbddbb,6ba587,d5d88d,88b884"></canvas>
      <div class="tgme_background_pattern default"></div>
    </div>

    <div class="tgme_page_wrap">

      <!-- Header (UNCHANGED except Open Bot link) -->
      <div class="tgme_head_wrap">
        <div class="tgme_head">
          <a href="//telegram.org/" class="tgme_head_brand">
            <svg class="tgme_logo" height="34" viewBox="0 0 133 34" width="133" xmlns="http://www.w3.org/2000/svg">

              </g>
            </svg>
          </a>
          <a class="tgme_head_right_btn" href="https://t.me/MembershipAppBot">Open Bot</a>
        </div>
      </div>

      <!-- Body — tgme_page with photo/title/desc replaced by channel rows -->
      <div class="tgme_body_wrap">
        <div class="tgme_page">

          <!-- Page title -->
          <div class="tgme_page_title" dir="auto">
            <span>Join Required Channels</span>
          </div>

          <!-- Two channel rows (replaces photo / description) -->
          <div id="cv-channel-list"></div>

          <!-- Main action button — shown only after all verified -->
          <div class="tgme_page_action" id="cv-main-action" style="display:none;">
            <a class="tgme_action_button_new shine" href="#" id="cv-continue-btn">Continue</a>
          </div>

          <!-- Footer note — reuses tgme_page_additional -->
          <div class="tgme_page_additional cv-footer">
            ⚠️ You must join and verify <strong>both channels</strong> to access the bot's features.
          </div>

        </div>
      </div>
    </div>

    <div id="tgme_frame_cont"></div>

    <!-- Toast -->
    <div class="cv-toast" id="cv-toast"></div>

    <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>

    <script type="text/javascript">
      // ── Wallpaper + theme (UNCHANGED from original) ──────────
      var tme_bg = document.getElementById('tgme_background');
      if (tme_bg) {
        TWallpaper.init(tme_bg);
        TWallpaper.animate(true);
        window.onfocus = function(){ TWallpaper.update(); };
      }
      document.body.classList.remove('no_transition');

      function toggleTheme(dark) {
        document.documentElement.classList.toggle('theme_dark', dark);
        window.Telegram && Telegram.setWidgetOptions && Telegram.setWidgetOptions({dark: dark});
      }
      if (window.matchMedia) {
        var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
        toggleTheme(darkMedia.matches);
        darkMedia.addListener(function(e) { toggleTheme(e.matches); });
      }

      // ── Telegram WebApp ──────────────────────────────────────
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { tg.ready(); tg.expand(); }

      // ── CONFIG ───────────────────────────────────────────────
      var CHANNELS = [
        { name: 'Paradox Updates',   username: '@paradox_updates',   link: 'https://t.me/paradox_updates'   },
        { name: 'Paradox Community', username: '@paradox_community', link: 'https://t.me/paradox_community' },
      ];
      // ────────────────────────────────────────────────────────

      var state = CHANNELS.map(function() { return { joined: false, verified: false }; });

      // ── Build channel rows ───────────────────────────────────
      var list = document.getElementById('cv-channel-list');

      CHANNELS.forEach(function(ch, i) {
        var row = document.createElement('div');
        row.className = 'cv-channel-row';
        row.innerHTML =
          '<div class="cv-avatar">' +
            '<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">' +
              '<path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>' +
            '</svg>' +
          '</div>' +
          '<div class="cv-meta">' +
            '<div class="cv-name">' + ch.name + '</div>' +
            '<div class="cv-handle">' + ch.username + '</div>' +
          '</div>' +
          '<div class="cv-btns">' +
            '<button class="cv-btn cv-btn-join"   id="btn-join-'   + i + '" onclick="doJoin('   + i + ')">Join</button>' +
            '<button class="cv-btn cv-btn-verify" id="btn-verify-' + i + '" onclick="doVerify(' + i + ')">Verify</button>' +
          '</div>' +
          '<div class="cv-verified-badge" id="badge-' + i + '">' +
            '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>' +
          '</div>';
        list.appendChild(row);
      });

      // ── Join ─────────────────────────────────────────────────
      function doJoin(i) {
        if (state[i].verified) return;
        var ch = CHANNELS[i];
        if (tg) tg.openTelegramLink(ch.link);
        else window.open(ch.link, '_blank');

        state[i].joined = true;
        var btn = document.getElementById('btn-join-' + i);
        btn.classList.add('done');
        btn.disabled = true;
        btn.textContent = 'Joined';
        haptic('light');
        showToast('Now tap Verify to confirm.', 'info');
      }

      // ── Verify ───────────────────────────────────────────────
      function doVerify(i) {
        if (state[i].verified) return;
        if (!state[i].joined) {
          showToast('Join the channel first!', 'error');
          haptic('error');
          return;
        }

        var btn = document.getElementById('btn-verify-' + i);
        btn.disabled = true;
        btn.innerHTML = '<span class="cv-spinner"></span> Checking…';

        // Simulate API check — replace with real verification call
        setTimeout(function() {
          state[i].verified = true;
          btn.classList.add('done');
          btn.textContent = 'Verified ✓';

          // Show badge with animation
          var badge = document.getElementById('badge-' + i);
          badge.classList.add('show');

          haptic('success');

          var allDone = state.every(function(s) { return s.verified; });
          if (allDone) {
            showToast('All channels verified! ✓', 'success');
            haptic('success');
            showMainButton();
          } else {
            showToast(CHANNELS[i].name + ' verified ✓', 'success');
          }
        }, 1500);
      }

      // ── Main button: shown only after all verified ────────────
      function showMainButton() {
        // Telegram WebApp native bottom button
        if (tg) {
          tg.MainButton.setText('Continue →');
          tg.MainButton.show();
          tg.MainButton.onClick(closeApp);
        }
        // Also show the in-page button as fallback / visual confirmation
        document.getElementById('cv-main-action').style.display = '';
        document.getElementById('cv-continue-btn').onclick = function(e) {
          e.preventDefault();
          closeApp();
        };
      }

      function closeApp() {
        if (tg) tg.close();
        else showToast('App would close now (demo mode)', 'info');
      }

      // ── Toast ────────────────────────────────────────────────
      var _toastTimer;
      function showToast(msg, type) {
        var el = document.getElementById('cv-toast');
        el.textContent = msg;
        el.className = 'cv-toast ' + (type || 'info') + ' show';
        clearTimeout(_toastTimer);
        _toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2800);
      }

      // ── Haptic ───────────────────────────────────────────────
      function haptic(type) {
        if (!tg) return;
        if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
        else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
        else tg.HapticFeedback.impactOccurred('light');
      }
    </script>
  </body>
</html>
