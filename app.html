<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b1020);
      --text: var(--tg-theme-text-color, #eff6ff);
      --hint: var(--tg-theme-hint-color, #93a4bf);
      --card: rgba(15, 23, 42, 0.76);
      --border: rgba(148, 163, 184, 0.25);
      --ok: #22c55e;
      --warn: #f59e0b;
      --error: #ef4444;
      --accent-btn-color: var(--tg-theme-button-color, #2aabee);
      --tme-logo-color: #ffffff;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
    }

    .tgme_background_wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: var(--bg);
    }

    #tgme_background {
      width: 100%;
      height: 100%;
      display: block;
    }

    .tgme_background_pattern {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: .35;
    }

    .tgme_page_wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: max(10px, env(safe-area-inset-top)) 12px max(12px, env(safe-area-inset-bottom));
      display: grid;
      gap: 12px;
    }

    .tgme_head_wrap {
      border: 1px solid var(--border);
      background: rgba(2, 6, 23, 0.62);
      border-radius: 14px;
      backdrop-filter: blur(10px);
    }

    .tgme_head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      gap: 10px;
    }

    .tgme_head_brand {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--text);
    }

    .tgme_logo {
      width: 133px;
      height: 34px;
      max-width: 100%;
    }

    .tgme_head_right_btn {
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 8px 11px;
      color: var(--text);
      background: rgba(255,255,255,0.03);
      text-decoration: none;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .tgme_body_wrap { display: flex; justify-content: center; }
    .tgme_page {
      width: min(560px, 100%);
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--card);
      backdrop-filter: blur(10px);
      overflow: hidden;
      box-shadow: 0 14px 35px rgba(0,0,0,.3);
    }

    .hero { padding: 16px; }
    .chip {
      display: inline-block;
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 12px;
      font-weight: 700;
      color: #bfdbfe;
      background: rgba(59,130,246,.25);
    }

    h1 { margin: 10px 0 5px; font-size: 23px; }
    #subtitle { margin: 0; color: var(--hint); font-size: 14px; line-height: 1.5; }

    #status {
      border-bottom: 1px solid rgba(255,255,255,.08);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--hint);
    }

    #status.ok { border-left: 3px solid var(--ok); color: #bbf7d0; }
    #status.warn { border-left: 3px solid var(--warn); color: #fde68a; }
    #status.error { border-left: 3px solid var(--error); color: #fecaca; }

    #channel-list {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .channel {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      background: rgba(255,255,255,.03);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .channel-title { font-size: 15px; font-weight: 700; word-break: break-word; }

    .badge {
      display: inline-block;
      margin-top: 4px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .badge.ok { color: #052e16; background: #86efac; }
    .badge.warn { color: #78350f; background: #fcd34d; }

    .join-btn {
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 9px 12px;
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .footer-note {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(2, 6, 23, 0.62);
      padding: 10px 12px;
      color: var(--hint);
      font-size: 12px;
      line-height: 1.45;
    }

    .footer-toast {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: max(12px, env(safe-area-inset-bottom));
      z-index: 20;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(2, 6, 23, 0.88);
      color: var(--text);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity .2s ease, transform .2s ease;
    }

    .footer-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 520px) {
      .channel { grid-template-columns: 1fr; }
      .tgme_logo { width: 108px; }
    }
  </style>
</head>

<body class="no_transition">

        </a>
        <a class="tgme_head_right_btn" href="//telegram.org/dl?tme=932e0863bf507dee4b_17373990884192425241" target="_blank" rel="noopener">
          Download

      </div>
    </div>

    <div class="tgme_body_wrap">
      <div class="tgme_page">
        <section class="card hero">
          <span class="chip">🔐 BB Verification</span>
          <h1>Join all required channels</h1>
          <p id="subtitle">Checking your membership via Bot Business webhook.</p>
        </section>

        <section class="card">
          <div id="status" class="warn">Initializing Telegram Mini App…</div>
          <div id="channel-list"></div>
        </section>

        <div class="footer-note" id="footer-note">
          Use Telegram Main Button to re-check. This screen updates automatically after each check.
        </div>
      </div>
    </div>
  </div>

  <div class="footer-toast" id="footer-toast"></div>

  <script src="https://telegram.org/js/tgwallpaper.min.js?3"></script>
  <script>
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const listEl = document.getElementById('channel-list');
    const toastEl = document.getElementById('footer-toast');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    function showToast(message, delay = 2600) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, delay);
    }

    function setStatus(kind, text) {
      statusEl.className = kind;
      statusEl.textContent = text;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function isValidWebhookUrl(url) {
      if (!url) return false;
      try {
        const parsed = new URL(url);
        return parsed.protocol === 'https:';
      } catch {
        return false;
      }
    }

    function renderChannels(channels) {
      listEl.innerHTML = '';

      if (!channels.length) {
        listEl.innerHTML = '<div class="channel"><div class="channel-title">No channels received from webhook.</div></div>';
        return;
      }

      channels.forEach((ch, index) => {
        const title = ch.channel || ch.title || ch.id || `Channel ${index + 1}`;
        const joined = Boolean(ch.joined);

        const row = document.createElement('article');
        row.className = 'channel';
        row.innerHTML = `
          <div>
            <div class="channel-title">${escapeHtml(title)}</div>
            <span class="badge ${joined ? 'ok' : 'warn'}">${joined ? 'Joined' : 'Not joined'}</span>
          </div>
        `;

        const right = document.createElement('div');
        if (!joined && ch.link) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'join-btn';
          btn.textContent = 'Join';
          btn.onclick = () => tg?.openTelegramLink(ch.link);
          right.appendChild(btn);
        }

        row.appendChild(right);
        listEl.appendChild(row);
      });
    }

    async function fetchWithTimeout(url, options, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing check webhook URL.');
        subtitleEl.textContent = 'Please open this app from your /start button.';
        showToast('Missing ?check= webhook url');
        return;
      }

      try {
        setStatus('warn', 'Checking memberships…');
        subtitleEl.textContent = 'Verifying channels from Bot Business webhook.';

        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now().toString());

        const resp = await fetchWithTimeout(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData: tg?.initData || null,
            platform: tg?.platform || null,
            version: tg?.version || null
          })
        }, 12000);

        const text = await resp.text();
        let data = null;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error('Webhook did not return valid JSON');
        }

        if (!resp.ok || !data?.ok) {
          throw new Error(data?.error || 'Webhook response error');
        }

        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);

        if (data.joined) {
          setStatus('ok', '✅ You joined all required channels. Closing mini app…');
          subtitleEl.textContent = 'Verification complete. Returning to bot.';
          tg?.HapticFeedback?.notificationOccurred('success');
          tg?.MainButton?.setText('Verified ✅');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          showToast('Verification success');
          setTimeout(() => tg?.close(), 1500);
          return;
        }

        setStatus('warn', 'Join missing channels, then use Main Button to re-check.');
        subtitleEl.textContent = 'After joining channels, tap Telegram Main Button.';
        tg?.MainButton?.setText('Re-check Membership');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
        showToast('Join pending channels and re-check');
      } catch (error) {
        const isAbort = error?.name === 'AbortError';
        setStatus('error', `❌ ${isAbort ? 'Webhook timeout' : error.message}`);
        subtitleEl.textContent = 'Check BB WebApp.render response format.';
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
        showToast(isAbort ? 'Request timeout, retry now' : error.message);
      }
    }

    function initWallpaper() {
      const bg = document.getElementById('tgme_background');
      if (!bg || !window.TWallpaper) {
        document.body.classList.remove('no_transition');
        return;
      }

      try {
        TWallpaper.init(bg);
        TWallpaper.animate(true);
        window.onfocus = function () { TWallpaper.update(); };
      } catch {
        // static fallback background remains
      }

      document.body.classList.remove('no_transition');
    }

    function initApp() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK not found.');
        subtitleEl.textContent = 'Open this page from Telegram bot web app button.';
        showToast('Open via Telegram bot');
        return;
      }

      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(runCheck);

      runCheck();
    }

    initWallpaper();
    initApp();
  </script>
