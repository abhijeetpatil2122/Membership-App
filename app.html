<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>

  <style>

    /* ─── Reset tap highlight on all interactive elements ─── */
    .join-btn,
    .tgme_action_button_new {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
      user-select: none;
    }

    /* ─── Join button ─── */
    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      min-width: 74px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent-btn-color);
      color: #fff !important;
      text-decoration: none !important;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
      border: 0;
      cursor: pointer;
      box-shadow: none !important;
      background-image: none !important;
      transition: opacity .15s ease;
    }
    .join-btn:hover  { opacity: .88; }
    .join-btn:active,
    .join-btn:focus  { outline: none !important; box-shadow: none !important; }
    .join-btn.is-loading { pointer-events: none; opacity: .92; }
    .join-btn.done   { pointer-events: none; opacity: .72; cursor: default; min-width: unset; padding: 0 6px; }

    /* ─── Spinners ─── */
    .join-spinner {
      width: 14px; height: 14px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .cont-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SVG status icon in join-btn ─── */
    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      flex-shrink: 0;
      line-height: 0;
    }
    .status-icon svg { width: 22px !important; height: 22px !important; display: block; }

    /* ─── JOIN loading content ─── */
    .join-load {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    /* ─── CONTINUE BUTTON ─── */
    .tgme_action_button_new.continue-btn {
      height: 54px !important;
      line-height: 54px !important;
      font-size: 17px !important;
      font-weight: 700 !important;
      padding: 0 32px !important;
      border-radius: 999px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 10px !important;
      transition: opacity .15s ease;
    }
    .tgme_action_button_new.continue-btn.locked {
      opacity: 0.45 !important;
      pointer-events: none !important;
      cursor: default !important;
    }
    .tgme_action_button_new.continue-btn.is-loading {
      pointer-events: none !important;
      opacity: .92 !important;
    }
    .tgme_action_button_new.continue-btn:active,
    .tgme_action_button_new.continue-btn:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    /* Continue SVG icon */
    .cont-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      flex-shrink: 0;
      line-height: 0;
    }
    .cont-icon svg { width: 26px !important; height: 26px !important; display: block; }

    /* Continue button wrapper */
    .continue-wrap {
      width: 100%;
      max-width: 340px;
      margin: -8px auto 0;
      padding: 0 16px 16px;
      box-sizing: border-box;
    }
    .continue-wrap .tgme_action_button_new.continue-btn {
      width: 100%;
      box-sizing: border-box;
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
      padding: 0;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      z-index: 9999;
      transition: opacity .22s ease, transform .22s ease;
      line-height: 1;
      overflow: hidden;
      vertical-align: middle;
    }
    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: #3dbb6e; }
    #toast.error   { background: #e5534b; }

    #toast-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      padding-left: 12px;
      box-sizing: border-box;
      line-height: 0;
      font-size: 0;
      vertical-align: middle;
    }
    #toast-icon svg {
      display: block !important;
      width: 20px !important;
      height: 20px !important;
      margin: 0 auto;
      flex-shrink: 0;
      vertical-align: middle;
    }
    #toast-msg {
      line-height: 1.2;
      flex-shrink: 0;
      padding: 10px 18px 10px 8px;
      display: inline-block;
      vertical-align: middle;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ─── Channel rows ─── */
    .channel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }
    .channel-row:first-child { padding-top: 8px; }
    .channel-row:last-child  { padding-bottom: 8px; }

    .channel-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .channel-name {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.1;
      color: var(--tme-logo-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-divider {
      width: 100%;
      height: 1px;
      background: rgba(127,127,127,.18);
    }

    /* Channel circle icons */
    .mini-icon-box {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 36px;
      overflow: hidden;
    }
    .mini-icon-box svg { width: 26px !important; height: 26px !important; display: block; }

    /* ─── Footer note ─── */
    .footer-note {
      margin-top: 8px;
      padding-bottom: 2px;
      font-size: 13.5px;
      line-height: 1.35;
      color: rgba(127,127,127,.95);
      text-align: center;
    }

    /* ─── Main header icon ─── */
    .main-icon-wrap {
      width: 72px; height: 72px;
      margin-bottom: 10px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* ─── Header title ─── */
    .header-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--tme-logo-color);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-btn-color);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    svg { vertical-align: middle; }

    /* ─── Loading state ─── */
    #channels-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      gap: 8px;
      color: rgba(127,127,127,.8);
      font-size: 14px;
    }

    @media (max-width: 460px) {
      #toast-msg { padding: 9px 16px 9px 6px; font-size: 13px; }
      #toast-icon { width: 36px; flex: 0 0 36px; padding-left: 10px; }
      #toast-icon svg { width: 18px !important; height: 18px !important; }
    }
  </style>
</head>

      <script>
  // ── Init Telegram WebApp ──
  var tg = window.Telegram && window.Telegram.WebApp;
  if (tg) { tg.ready(); tg.expand(); }

  var tme_bg = document.getElementById('tgme_background');
  if (tme_bg) {
    TWallpaper.init(tme_bg);
    TWallpaper.animate(true);
    window.onfocus = function(){ TWallpaper.update(); };
  }

  // ── Check if running in Telegram or Browser ──
  var isTelegram = !!(tg && tg.initData);
  var isBrowser = !isTelegram;

  // ── Universal Haptic (vibration for browser, haptic for Telegram) ──
  function universalHaptic(type) {
    // Telegram haptic feedback
    try { 
      if (tg && tg.HapticFeedback) {
        if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
        else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
        else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
        else tg.HapticFeedback.impactOccurred('light');
      }
    } catch(e){}
    
    // Browser vibration (if supported)
    if (isBrowser && window.navigator && window.navigator.vibrate) {
      if (type === 'success') window.navigator.vibrate(100);
      else if (type === 'error') window.navigator.vibrate([200, 100, 200]);
      else if (type === 'warning') window.navigator.vibrate([100, 50, 100]);
      else window.navigator.vibrate(50);
    }
  }

  // ── Universal Close (works in both Telegram and Browser) ──
  function universalClose() {
    if (tg) {
      // Telegram WebApp close
      tg.close();
    } else {
      // Browser fallback - show a message and redirect or close tab
      if (window.history.length > 1) {
        window.history.back();
      } else {
        // Show a friendly message since we can't force close browser tabs
        var closeMsg = document.createElement('div');
        closeMsg.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#28a745;color:white;padding:12px24px;border-radius:999px;font-size:14px;z-index:10000;animation:fadeOut 2s ease forwards;';
        closeMsg.textContent = '✓ Verification complete! You can close this tab now.';
        document.body.appendChild(closeMsg);
        
        // Add fade out animation
        var style = document.createElement('style');
        style.textContent = '@keyframes fadeOut {0%{opacity:1;}70%{opacity:1;}100%{opacity:0;visibility:hidden;}}';
        document.head.appendChild(style);
        
        setTimeout(function() {
          if (closeMsg) closeMsg.remove();
        }, 3000);
      }
    }
  }

  var tme_bg = document.getElementById('tgme_background');
  if (tme_bg) {
    TWallpaper.init(tme_bg);
    TWallpaper.animate(true);
    window.onfocus = function(){ TWallpaper.update(); };
  }

  // ── SVGs ──

  var SVG_CHANNEL = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="chca"><rect width="512" height="512"/></clipPath><clipPath id="chcb"><path d="M0,0 L100,0 L100,100 L0,100z"/></clipPath></defs><g clip-path="url(#chca)"><g clip-path="url(#chcb)" transform="matrix(5.12,0,0,5.12,0,0)"><g><g><path stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#fff" stroke-width="6" d="M35.285,72.25h37.59c4.937,0 9-4.063 9-9v-32.875c0-4.937-4.063-9-9-9h-46c-4.937,0-9,4.062-9,9v51.458c0,2.662 3.21,4.005 5.106,2.136l11.602-11.462c.187-.185.439-.288.702-.288zM34.875,53.625h20.875M34.875,39.625h31.375"/></g></g></g></g></svg>';

  // Telegram logo SVG for info toast
  var SVG_TELEGRAM = '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 512 512" width="512" height="512" style="width: 100%; height: 100%; transform: translate3d(0,0,0);" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="__lottie_element_2"><rect width="512" height="512" x="0" y="0"></rect></clipPath></defs><g clip-path="url(#__lottie_element_2)"><g style="display: block;" transform="matrix(1.333299994468689,0,0,1.333299994468689,0,0)" opacity="1"><g opacity="1" transform="matrix(1,0,0,1,0,0)"><g opacity="1" transform="matrix(1,0,0,1,0,0)"><path fill="rgb(255,255,255)" fill-opacity="1" d=" M77.16000366210938,177.49000549316406 C144.91000366210938,148.02999877929688 190.0800018310547,128.61000061035156 212.69000244140625,119.22000122070312 C277.2300109863281,92.43000030517578 290.6400146484375,87.77999877929688 299.3800048828125,87.62000274658203 C301.29998779296875,87.58999633789062 305.6000061035156,88.06999969482422 308.3800048828125,90.31999969482422 C310.7300109863281,92.2300033569336 311.3800048828125,94.80000305175781 311.69000244140625,96.5999984741211 C312,98.4000015258789 312.3800048828125,102.5199966430664 312.0799865722656,105.7300033569336 C308.5799865722656,142.41000366210938 293.45001220703125,231.4199981689453 285.75,272.5 C282.489990234375,289.8800048828125 276.0799865722656,295.7099914550781 269.8699951171875,296.2799987792969 C256.3699951171875,297.5199890136719 246.1199951171875,287.3699951171875 233.0500030517578,278.82000732421875 C212.60000610351562,265.44000244140625 201.0399932861328,257.1099853515625 181.19000244140625,244.0500030517578 C158.24000549316406,228.9600067138672 173.1199951171875,220.66000366210938 186.1999969482422,207.11000061035156 C189.6199951171875,203.55999755859375 249.0800018310547,149.57000732421875 250.22999572753906,144.67999267578125 C250.3699951171875,144.07000732421875 250.50999450683594,141.7899932861328 249.14999389648438,140.5800018310547 C247.7899932861328,139.3699951171875 245.7899932861328,139.7899932861328 244.33999633789062,140.1199951171875 C242.2899932861328,140.5800018310547 209.61000061035156,162.13999938964844 146.30999755859375,204.7899932861328 C137.02999877929688,211.14999389648438 128.63999938964844,214.22999572753906 121.11000061035156,214.07000732421875 C112.80999755859375,213.88999938964844 96.8499984741211,209.38999938964844 84.9800033569336,205.5399932861328 C70.43000030517578,200.82000732421875 58.869998931884766,198.32000732421875 59.869998931884766,190.3000030517578 C60.400001525878906,186.1199951171875 66.16000366210938,181.85000610351562 77.16000366210938,177.49000549316406 C77.16000366210938,177.49000549316406 77.16000366210938,177.49000549316406 77.16000366210938,177.49000549316406z"></path></g></g></g></g></svg>';

  // ── Add CSS for info toast
  var style = document.createElement('style');
  style.textContent = '#toast.info { background: #7d7d7d !important; }';
  document.head.appendChild(style);

  // ── Helper: Open Telegram link using WebApp API ──
  function openTelegramLink(url) {
    if (tg && tg.openTelegramLink) {
      tg.openTelegramLink(url);
    } else if (tg && tg.openLink) {
      tg.openLink(url);
    } else {
      window.open(url, '_blank');
    }
  }

  // ── State ──
  var WEBHOOK_URL = null;
  var CHANNELS_DATA = [];
  var isVerifying = false;
  var autoCloseTimer = null;
  var isAlreadyJoined = false;

  // ── Parse ?check= param ──
  var urlParams = new URLSearchParams(location.search);
  var checkParam = urlParams.get('check');
  if (checkParam) WEBHOOK_URL = decodeURIComponent(checkParam);

  // ── Render continue button ──
  function renderContinueNormal() {
    var btn = document.getElementById('continue-btn');
    btn.innerHTML = '<span class="cont-icon">' + SVG_CONTINUE + '</span>Continue';
  }
  renderContinueNormal();

  // ── Check if all joined → unlock continue ──
  function checkAllJoined() {
    var btn = document.getElementById('continue-btn');
    var allJoined = CHANNELS_DATA.length > 0 && CHANNELS_DATA.every(function(ch) { return ch.joined; });
    
    if (allJoined) {
      btn.classList.remove('locked');
      isAlreadyJoined = true;
      if (autoCloseTimer) clearTimeout(autoCloseTimer);
      autoCloseTimer = setTimeout(function() {
        if (CHANNELS_DATA.every(function(ch) { return ch.joined; })) {
          showToast('success', 'All channels joined! Closing...');
          setTimeout(function() {
            universalClose();
          }, 1000);
        }
      }, 5000);
    } else {
      btn.classList.add('locked');
      isAlreadyJoined = false;
      if (autoCloseTimer) {
        clearTimeout(autoCloseTimer);
        autoCloseTimer = null;
      }
    }
  }

  // ── Escape HTML ──
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Update all channel buttons ──
  function updateChannelButtons() {
    var rows = document.querySelectorAll('#channels-list .channel-row');
    
    CHANNELS_DATA.forEach(function(ch, idx) {
      var row = rows[idx];
      if (!row) return;
      
      var btnContainer = row.querySelector('.join-btn, .join-btn.done, a.join-btn');
      if (!btnContainer) return;
      
      var newBtnHtml;
      
      if (ch.joined) {
        newBtnHtml = '<span class="join-btn done"><span class="status-icon">' + SVG_SUCCESS + '</span></span>';
      } else {
        newBtnHtml = '<a class="join-btn" href="#" data-channel-index="' + idx + '" onclick="return handleJoinClick(this, ' + idx + ', \'' + escHtml(ch.link) + '\')">Join</a>';
      }
      
      var parent = btnContainer.parentNode;
      var tempDiv = document.createElement('div');
      tempDiv.innerHTML = newBtnHtml;
      var newBtn = tempDiv.firstChild;
      parent.replaceChild(newBtn, btnContainer);
    });
    
    checkAllJoined();
  }

  // ── Render channel list ──
  function renderChannels(channels) {
    CHANNELS_DATA = channels;
    var list = document.getElementById('channels-list');
    list.innerHTML = '';

    channels.forEach(function(ch, i) {
      if (i > 0) {
        var divider = document.createElement('div');
        divider.className = 'channel-divider';
        list.appendChild(divider);
      }

      var row = document.createElement('div');
      row.className = 'channel-row';

      var btnHtml;
      if (ch.joined) {
        btnHtml = '<span class="join-btn done"><span class="status-icon">' + SVG_SUCCESS + '</span></span>';
      } else {
        btnHtml = '<a class="join-btn" href="#" data-channel-index="' + i + '" onclick="return handleJoinClick(this, ' + i + ', \'' + escHtml(ch.link) + '\')">Join</a>';
      }

      row.innerHTML =
        '<div class="channel-left">' +
          '<div class="mini-icon-box">' + SVG_CHANNEL + '</div>' +
          '<div class="channel-name">' + escHtml(ch.name || ch.channel) + '</div>' +
        '</div>' +
        btnHtml;

      list.appendChild(row);
    });

    checkAllJoined();
  }

  // ── Handle join click ──
  function handleJoinClick(btn, idx, channelLink) {
    if (!btn || btn.classList.contains('done') || isVerifying) return false;
    
    isVerifying = true;
    var originalHtml = 'Join';
    
    btn.classList.add('is-loading');
    btn.innerHTML = '<span class="join-load"><span class="join-spinner"></span>Opening...</span>';
    
    openTelegramLink(channelLink);
    
    showToast('info', 'Please join the channel in Telegram, then wait...');
    
    setTimeout(function() {
      btn.innerHTML = '<span class="join-load"><span class="join-spinner"></span>Verifying...</span>';
      
      if (!WEBHOOK_URL) {
        btn.classList.remove('is-loading');
        btn.innerHTML = originalHtml;
        isVerifying = false;
        return false;
      }
      
      fetch(WEBHOOK_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.channels && data.channels[idx]) {
            var isJoined = data.channels[idx].joined;
            
            if (isJoined) {
              btn.classList.remove('is-loading');
              btn.classList.add('done');
              btn.innerHTML = '<span class="status-icon">' + SVG_SUCCESS + '</span>';
              CHANNELS_DATA[idx].joined = true;
              showToast('success', 'Joined successfully!');
              universalHaptic('success');
              checkAllJoined();
            } else {
              btn.classList.remove('is-loading');
              btn.classList.remove('done');
              btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
              showToast('error', 'Please join the channel first, then try again');
              universalHaptic('error');
              setTimeout(function() {
                if (btn && !CHANNELS_DATA[idx].joined) {
                  btn.innerHTML = originalHtml;
                  btn.classList.remove('is-loading');
                }
              }, 2000);
            }
          } else {
            btn.classList.remove('is-loading');
            btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
            showToast('error', 'Verification failed, please try again');
            setTimeout(function() {
              if (btn && !CHANNELS_DATA[idx].joined) {
                btn.innerHTML = originalHtml;
                btn.classList.remove('is-loading');
              }
            }, 2000);
          }
          isVerifying = false;
        })
        .catch(function() {
          btn.classList.remove('is-loading');
          btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
          showToast('error', 'Network error, please try again');
          universalHaptic('error');
          setTimeout(function() {
            if (btn && !CHANNELS_DATA[idx].joined) {
              btn.innerHTML = originalHtml;
              btn.classList.remove('is-loading');
            }
          }, 2000);
          isVerifying = false;
        });
    }, 5000);
    
    return false;
  }

  // ── Toast ──
  var toastTimer;
  function showToast(type, msg) {
    var el  = document.getElementById('toast');
    var ico = document.getElementById('toast-icon');
    var txt = document.getElementById('toast-msg');
    clearTimeout(toastTimer);
    el.classList.remove('show');
    
    if (type === 'info') {
      el.className = 'info';
      el.style.background = '#7d7d7d';
      ico.innerHTML = SVG_TELEGRAM;
    } else {
      el.className = type;
      el.style.background = '';
      ico.innerHTML = type === 'success' ? SVG_SUCCESS : SVG_ERROR;
    }
    
    txt.textContent = msg;
    void el.offsetWidth;
    el.classList.add('show');
    if (type !== 'info') universalHaptic(type);
    toastTimer = setTimeout(function(){ 
      el.classList.remove('show');
    }, 2800);
  }

  // ── Continue button handler ──
  function continueBot(btn) {
    if (!btn || btn.classList.contains('is-loading') || btn.classList.contains('locked')) return false;
    if (!WEBHOOK_URL) return false;

    // If already joined, close immediately
    if (isAlreadyJoined && CHANNELS_DATA.length > 0 && CHANNELS_DATA.every(function(ch) { return ch.joined; })) {
      showToast('success', 'Already verified! Closing...');
      universalHaptic('success');
      setTimeout(function() {
        universalClose();
      }, 800);
      return false;
    }

    btn.classList.add('is-loading');
    btn.innerHTML = '<span class="cont-spinner"></span>Verifying';

    fetch(WEBHOOK_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.joined) {
          btn.innerHTML = '<span class="cont-spinner"></span>Continuing';
          universalHaptic('success');
          setTimeout(function() {
            universalClose();
          }, 600);
        } else {
          if (data.channels) {
            CHANNELS_DATA = data.channels;
            updateChannelButtons();
          }
          btn.classList.remove('is-loading');
          renderContinueNormal();
          showToast('error', 'Please join all channels first');
          universalHaptic('error');
        }
      })
      .catch(function() {
        btn.classList.remove('is-loading');
        renderContinueNormal();
        showToast('error', 'Network error, try again');
        universalHaptic('error');
      });

    return false;
  }

  // ── Load channels on startup ──
  function loadChannels() {
    if (!WEBHOOK_URL) {
      renderChannels([
        { channel: '@Example', name: 'Example Channel', link: 'https://t.me/example', joined: false }
      ]);
      return;
    }

    fetch(WEBHOOK_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderChannels(data.channels);
        if (data.joined) {
          showToast('success', 'All channels verified!');
          universalHaptic('success');
          setTimeout(function() {
            universalClose();
          }, 5000);
        }
      })
      .catch(function() {
        document.getElementById('channels-list').innerHTML =
          '<div style="padding:16px 0;text-align:center;color:rgba(127,127,127,.8);font-size:14px;">Failed to load channels.<br>Please close and try again.</div>';
        showToast('error', 'Failed to load channels');
        universalHaptic('error');
      });
  }

  loadChannels();

  document.body.classList.remove('no_transition');
</script>
