<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Channel Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- Dark mode class set before render — exactly like original source -->
  <script>window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches&&document.documentElement&&document.documentElement.classList&&document.documentElement.classList.add('theme_dark');</script>

  <link rel="icon" type="image/svg+xml" href="//telegram.org/img/website_icon.svg?4">

  <!-- Telegram's own CSS — this is what makes the wallpaper canvas render correctly -->
  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet" type="text/css">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet" media="screen">

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    /* ── Tokens ─────────────────────────────────────────────── */
    :root {
      --btn-bg:  var(--tg-theme-button-color,      #2aabee);
      --btn-txt: var(--tg-theme-button-text-color,  #ffffff);
      --ok:      #22c55e;
      --err:     #ef4444;
      --warn:    #f59e0b;
      --ok-bg:   rgba(34,197,94,0.13);
      --err-bg:  rgba(239,68,68,0.13);
      --warn-bg: rgba(245,158,11,0.13);
    }

    /* ── Layout override on top of telegram.css ─────────────── */
    /* Give page enough bottom padding for MainButton */
    .tgme_page { padding-bottom: 20px; }

    /* ── Header "Open Bot" button — branded colour ─────────── */
    .tgme_head_right_btn {
      background: var(--btn-bg) !important;
      color: var(--btn-txt) !important;
      border: none !important;
      border-radius: 9px !important;
      font-weight: 600 !important;
    }

    /* ── Hero block (replaces tgme_page_photo/title) ────────── */
    .cv-hero {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 4px 0 16px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      margin-bottom: 4px;
    }
    .theme_dark .cv-hero { border-bottom-color: rgba(255,255,255,0.07); }

    .cv-hero-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(42,171,238,0.35);
    }
    .cv-hero-icon svg { width: 26px; height: 26px; fill: #fff; }

    .cv-hero-text { flex: 1; min-width: 0; }
    .cv-hero-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .065em;
      text-transform: uppercase;
      color: var(--btn-bg);
      margin-bottom: 4px;
    }
    .cv-hero-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      margin: 0 0 3px;
    }
    .cv-hero-sub {
      font-size: 13px;
      line-height: 1.45;
      opacity: .65;
      margin: 0;
    }

    /* ── Status bar ─────────────────────────────────────────── */
    .cv-status {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.4;
      margin-bottom: 10px;
      background: var(--warn-bg);
      color: #92400e;
      transition: background .25s, color .25s;
    }
    .theme_dark .cv-status { color: #fde68a; }

    .cv-status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--warn);
      transition: background .25s;
    }
    .cv-status.ok   { background: var(--ok-bg);  color: #14532d; }
    .theme_dark .cv-status.ok { color: #86efac; }
    .cv-status.ok   .cv-status-dot { background: var(--ok); }

    .cv-status.err  { background: var(--err-bg); color: #7f1d1d; }
    .theme_dark .cv-status.err { color: #fecaca; }
    .cv-status.err  .cv-status-dot { background: var(--err); }

    /* ── Channel list ───────────────────────────────────────── */
    .cv-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    /* Single channel row */
    .cv-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border: 1px solid rgba(0,0,0,0.09);
      border-radius: 13px;
      background: rgba(0,0,0,0.02);
      transition: border-color .2s;
    }
    .theme_dark .cv-row {
      border-color: rgba(255,255,255,0.09);
      background: rgba(255,255,255,0.03);
    }
    .cv-row.joined-row { border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.04); }

    /* Avatar */
    .cv-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--btn-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .cv-avatar svg { fill: #fff; width: 20px; height: 20px; }

    /* Info */
    .cv-info { flex: 1; min-width: 0; }
    .cv-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .cv-handle {
      font-size: 12px;
      opacity: .55;
      margin-top: 2px;
    }

    /* ── Join / Joined button ───────────────────────────────── */
    .cv-join-btn {
      flex-shrink: 0;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      background: var(--btn-bg);
      color: var(--btn-txt);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity .15s, background .2s, color .2s;
    }
    .cv-join-btn:active   { opacity: .72; }
    .cv-join-btn:disabled { cursor: default; }

    /* Joined state */
    .cv-join-btn.done {
      background: var(--ok-bg);
      color: var(--ok);
      pointer-events: none;
    }

    /* Success circle icon (shown when joined) */
    .cv-join-btn.done svg { width: 16px; height: 16px; fill: var(--ok); flex-shrink: 0; }

    /* Spinner */
    .cv-spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: cv-spin .65s linear infinite;
      flex-shrink: 0;
    }
    .cv-join-btn.done .cv-spinner { display: none; }
    @keyframes cv-spin { to { transform: rotate(360deg); } }

    /* ── Footer note ────────────────────────────────────────── */
    /* Reuse telegram.css tgme_page_additional style, no overrides needed */

    /* ── Toast ──────────────────────────────────────────────── */
    .cv-toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(14px);
      z-index: 999;
      border-radius: 20px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity .22s ease, transform .25s ease;
      box-shadow: 0 4px 18px rgba(0,0,0,.28);
      /* default */
      background: #334155;
    }
    .cv-toast.show            { opacity: 1; transform: translateX(-50%) translateY(0); }
    .cv-toast.t-ok            { background: #15803d; }
    .cv-toast.t-err           { background: #b91c1c; }
    .cv-toast.t-warn          { background: #b45309; }
  </style>
</head>

  <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>
  <script type="text/javascript">
    var tme_bg = document.getElementById('tgme_background');
    if (tme_bg) {
      TWallpaper.init(tme_bg);
      TWallpaper.animate(true);
      window.onfocus = function(){ TWallpaper.update(); };
    }
    document.body.classList.remove('no_transition');

    function toggleTheme(dark) {
      document.documentElement.classList.toggle('theme_dark', dark);
      window.Telegram && Telegram.setWidgetOptions && Telegram.setWidgetOptions({dark: dark});
    }
    if (window.matchMedia) {
      var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
      toggleTheme(darkMedia.matches);
      darkMedia.addListener(function(e){ toggleTheme(e.matches); });
    }
  </script>

  <!-- App logic -->
  <script>
    // ── Refs ─────────────────────────────────────────────────
    const tg            = window.Telegram?.WebApp;
    const statusEl      = document.getElementById('status');
    const statusTextEl  = document.getElementById('status-text');
    const subtitleEl    = document.getElementById('subtitle');
    const listEl        = document.getElementById('channel-list');
    const toastEl       = document.getElementById('cv-toast');
    const checkEndpoint = new URLSearchParams(window.location.search).get('check');

    // ── Toast ────────────────────────────────────────────────
    // type: 'ok' | 'err' | 'warn' | ''
    let _toastTimer;
    function showToast(msg, type, ms) {
      toastEl.textContent = msg;
      toastEl.className = 'cv-toast show' + (type ? ' t-' + type : '');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms || 2800);
    }

    // ── Status bar ───────────────────────────────────────────
    // kind: 'ok' | 'err' | '' (warn = default yellow)
    function setStatus(kind, text) {
      statusEl.className = 'cv-status' + (kind ? ' ' + kind : '');
      statusTextEl.textContent = text;
    }

    // ── Haptic helpers ───────────────────────────────────────
    function haptic(type) {
      if (!tg) return;
      if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
      else if (type === 'warn') tg.HapticFeedback.notificationOccurred('warning');
      else tg.HapticFeedback.impactOccurred('light');
    }

    // ── Security helpers (UNCHANGED) ─────────────────────────
    function escapeHtml(v) {
      return String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }
    function isValidWebhookUrl(url) {
      if (!url) return false;
      try { return new URL(url).protocol === 'https:'; } catch { return false; }
    }

    // ── SVG helpers ──────────────────────────────────────────
    const SVG_CHANNEL = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>`;
    const SVG_CHECK   = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>`;

    // ── Render channels ──────────────────────────────────────
    function renderChannels(channels) {
      listEl.innerHTML = '';
      if (!channels.length) {
        listEl.innerHTML = '<div style="font-size:13px;opacity:.6;padding:4px 0">No channels received from webhook.</div>';
        return;
      }

      channels.forEach((ch, idx) => {
        const title  = ch.channel || ch.title || ch.id || ('Channel ' + (idx + 1));
        const handle = ch.username ? '@' + ch.username.replace('@','') : '';
        const joined = Boolean(ch.joined);

        const row = document.createElement('div');
        row.className = 'cv-row' + (joined ? ' joined-row' : '');

        // Avatar
        const avatar = document.createElement('div');
        avatar.className = 'cv-avatar';
        avatar.innerHTML = SVG_CHANNEL;

        // Info
        const info = document.createElement('div');
        info.className = 'cv-info';
        info.innerHTML =
          '<div class="cv-name">' + escapeHtml(title) + '</div>' +
          (handle ? '<div class="cv-handle">' + escapeHtml(handle) + '</div>' : '');

        // Button
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cv-join-btn' + (joined ? ' done' : '');

        if (joined) {
          btn.innerHTML = SVG_CHECK + ' Joined';
          btn.disabled  = true;
        } else {
          btn.textContent = 'Join';
          btn.onclick = function() {
            haptic('light');

            // Open channel
            if (ch.link) {
              if (tg) tg.openTelegramLink(ch.link);
              else window.open(ch.link, '_blank');
            }

            // Spinner while switching app
            btn.disabled = true;
            btn.innerHTML = '<span class="cv-spinner"></span>';

            setTimeout(() => {
              btn.classList.add('done');
              btn.innerHTML = SVG_CHECK + ' Joined';
              row.classList.add('joined-row');
              haptic('success');
              showToast('Joined! Tap Re-check to verify.', 'ok');
            }, 2000);
          };
        }

        row.appendChild(avatar);
        row.appendChild(info);
        row.appendChild(btn);
        listEl.appendChild(row);
      });
    }

    // ── Fetch with timeout (UNCHANGED) ───────────────────────
    async function fetchWithTimeout(url, opts, ms) {
      const ctrl  = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), ms);
      try { return await fetch(url, { ...opts, signal: ctrl.signal }); }
      finally { clearTimeout(timer); }
    }

    // ── Main check (logic UNCHANGED, haptic + toast updated) ──
    async function runCheck() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('err', 'Invalid or missing check webhook URL.');
        subtitleEl.textContent = 'Please open this app from your /start button.';
        haptic('error');
        showToast('Missing ?check= webhook URL', 'err');
        return;
      }

      try {
        setStatus('', 'Checking memberships…');
        subtitleEl.textContent = 'Verifying channels from Bot Business webhook.';

        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now().toString());

        const resp = await fetchWithTimeout(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData: tg?.initData || null,
            platform: tg?.platform || null,
            version:  tg?.version  || null
          })
        }, 12000);

        const text = await resp.text();
        let data = null;
        try { data = JSON.parse(text); }
        catch { throw new Error('Webhook did not return valid JSON'); }

        if (!resp.ok || !data?.ok) throw new Error(data?.error || 'Webhook response error');

        const channels = Array.isArray(data.channels) ? data.channels : [];
        renderChannels(channels);

        if (data.joined) {
          setStatus('ok', '✅ All channels verified — closing…');
          subtitleEl.textContent = 'Verification complete. Returning to bot.';
          haptic('success');
          tg?.MainButton?.setText('Verified ✅');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          showToast('All channels verified!', 'ok', 2000);
          // Close mini app notification via alert then close
          tg?.showAlert?.('✅ Verification complete! You may now use the bot.', () => tg?.close());
          if (!tg?.showAlert) setTimeout(() => tg?.close(), 1500);
          return;
        }

        setStatus('', 'Join missing channels, then tap Re-check.');
        subtitleEl.textContent = 'After joining, tap the Telegram Main Button to re-check.';
        haptic('warn');
        tg?.MainButton?.setText('Re-check Membership');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
        showToast('Join pending channels and re-check', 'warn');

      } catch (error) {
        const isAbort = error?.name === 'AbortError';
        setStatus('err', isAbort ? 'Webhook timeout — tap Retry' : error.message);
        subtitleEl.textContent = 'Check BB WebApp.render response format.';
        haptic('error');
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
        showToast(isAbort ? 'Request timed out' : error.message, 'err');
      }
    }

    // ── Boot ─────────────────────────────────────────────────
    if (!tg) {
      setStatus('err', 'Telegram WebApp SDK not found.');
      subtitleEl.textContent = 'Open this page from a Telegram bot web app button.';
      showToast('Open via Telegram bot', 'err');
    } else {
      tg.ready();
      tg.expand();
      // Notify Telegram the app is ready (shows native loading complete)
      tg.MainButton?.onClick(runCheck);
      runCheck();
    }
  </script>
</body>
</html>
