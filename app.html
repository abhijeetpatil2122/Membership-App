<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Telegram WebApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link href="//telegram.org/css/font-roboto.css?1" rel="stylesheet">
  <link href="//telegram.org/css/bootstrap.min.css?3" rel="stylesheet">
  <link href="//telegram.org/css/telegram.css?249" rel="stylesheet">

  <script>
    window.matchMedia &&
    window.matchMedia('(prefers-color-scheme: dark)').matches &&
    document.documentElement.classList.add('theme_dark');
  </script>

  <style>

    /* ─── Reset tap highlight on all interactive elements ─── */
    .join-btn,
    .tgme_action_button_new {
      -webkit-tap-highlight-color: transparent;
      outline: none !important;
      user-select: none;
    }

    /* ─── Join button ─── */
    .join-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      min-width: 74px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent-btn-color);
      color: #fff !important;
      text-decoration: none !important;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      flex: 0 0 auto;
      border: 0;
      cursor: pointer;
      box-shadow: none !important;
      background-image: none !important;
      transition: opacity .15s ease;
    }
    .join-btn:hover  { opacity: .88; }
    .join-btn:active,
    .join-btn:focus  { outline: none !important; box-shadow: none !important; }
    .join-btn.is-loading { pointer-events: none; opacity: .92; }
    .join-btn.done   { pointer-events: none; opacity: .72; cursor: default; min-width: unset; padding: 0 6px; }

    /* ─── Spinners ─── */
    .join-spinner {
      width: 14px; height: 14px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    .cont-spinner {
      width: 18px; height: 18px;
      border: 2.5px solid rgba(255,255,255,.30);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .75s linear infinite;
      display: inline-block;
      flex-shrink: 0;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SVG status icon in join-btn ─── */
    .status-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      flex-shrink: 0;
      line-height: 0;
    }
    .status-icon svg { width: 22px !important; height: 22px !important; display: block; }

    /* ─── JOIN loading content ─── */
    .join-load {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      line-height: 1;
    }

    /* ─── CONTINUE BUTTON ─── */
    .tgme_action_button_new.continue-btn {
      height: 54px !important;
      line-height: 54px !important;
      font-size: 17px !important;
      font-weight: 700 !important;
      padding: 0 32px !important;
      border-radius: 999px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 10px !important;
      transition: opacity .15s ease;
    }
    .tgme_action_button_new.continue-btn.locked {
      opacity: 0.45 !important;
      pointer-events: none !important;
      cursor: default !important;
    }
    .tgme_action_button_new.continue-btn.is-loading {
      pointer-events: none !important;
      opacity: .92 !important;
    }
    .tgme_action_button_new.continue-btn:active,
    .tgme_action_button_new.continue-btn:focus {
      outline: none !important;
      box-shadow: none !important;
    }

    /* Continue SVG icon */
    .cont-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px; height: 26px;
      flex-shrink: 0;
      line-height: 0;
    }
    .cont-icon svg { width: 26px !important; height: 26px !important; display: block; }

    /* Continue button wrapper */
    .continue-wrap {
      width: 100%;
      max-width: 340px;
      margin: -8px auto 0;
      padding: 0 16px 16px;
      box-sizing: border-box;
    }
    .continue-wrap .tgme_action_button_new.continue-btn {
      width: 100%;
      box-sizing: border-box;
    }

    /* ─── Toast ─── */
    #toast {
      position: fixed;
      bottom: 76px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      opacity: 0;
      pointer-events: none;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      flex-wrap: nowrap;
      gap: 0;
      padding: 0;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      z-index: 9999;
      transition: opacity .22s ease, transform .22s ease;
      line-height: 1;
      overflow: hidden;
      vertical-align: middle;
    }
    #toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: #3dbb6e; }
    #toast.error   { background: #e5534b; }

    #toast-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      flex: 0 0 40px;
      padding-left: 12px;
      box-sizing: border-box;
      line-height: 0;
      font-size: 0;
      vertical-align: middle;
    }
    #toast-icon svg {
      display: block !important;
      width: 20px !important;
      height: 20px !important;
      margin: 0 auto;
      flex-shrink: 0;
      vertical-align: middle;
    }
    #toast-msg {
      line-height: 1.2;
      flex-shrink: 0;
      padding: 10px 18px 10px 8px;
      display: inline-block;
      vertical-align: middle;
      white-space: nowrap;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    /* ─── Channel rows ─── */
    .channel-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }
    .channel-row:first-child { padding-top: 8px; }
    .channel-row:last-child  { padding-bottom: 8px; }

    .channel-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .channel-name {
      font-weight: 600;
      font-size: 14.5px;
      line-height: 1.1;
      color: var(--tme-logo-color);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .channel-divider {
      width: 100%;
      height: 1px;
      background: rgba(127,127,127,.18);
    }

    /* Channel circle icons */
    .mini-icon-box {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 36px;
      overflow: hidden;
    }
    .mini-icon-box svg { width: 26px !important; height: 26px !important; display: block; }

    /* ─── Footer note ─── */
    .footer-note {
      margin-top: 8px;
      padding-bottom: 2px;
      font-size: 13.5px;
      line-height: 1.35;
      color: rgba(127,127,127,.95);
      text-align: center;
    }

    /* ─── Main header icon ─── */
    .main-icon-wrap {
      width: 72px; height: 72px;
      margin-bottom: 10px;
      border-radius: 50%;
      background: var(--accent-btn-color);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* ─── Header title ─── */
    .header-title {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.025em;
      color: var(--tme-logo-color);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .header-title-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-btn-color);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    svg { vertical-align: middle; }

    /* ─── Loading state ─── */
    #channels-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 0;
      gap: 8px;
      color: rgba(127,127,127,.8);
      font-size: 14px;
    }

    @media (max-width: 460px) {
      #toast-msg { padding: 9px 16px 9px 6px; font-size: 13px; }
      #toast-icon { width: 36px; flex: 0 0 36px; padding-left: 10px; }
      #toast-icon svg { width: 18px !important; height: 18px !important; }
    }
  </style>
</head>

  var SVG_CONTINUE = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="cnc2"><rect width="512" height="512"/></clipPath><clipPath id="cnc3"><path d="M0,0 L101,0 L101,100 L0,100z"/></clipPath></defs><g clip-path="url(#cnc2)"><g clip-path="url(#cnc3)" transform="matrix(5.069,0,0,5.069,0,2.535)"><g><g><path fill-rule="evenodd" fill="#fff" d="M40.889,34.352c.997-5.655 6.39-9.431 12.045-8.434 5.655.997 9.43,6.39 8.434,12.045l-1.136,6.438c.114.028.223.06.329.095 1.789.597 3.196,2.004 3.793,3.793.308.924.308,2.069.308,4.358v6.143c0,2.29,0,3.434-.308,4.358-.597,1.789-2.004,3.196-3.793,3.793-.924.308-2.07.308-4.359.308h-11.517c-2.29,0-3.435,0-4.36-.308-1.788-.597-3.195-2.005-3.792-3.793-.308-.925-.308-2.07-.308-4.358v-6.143c0-2.29,0-3.434.308-4.358.597-1.789 2.004-3.197 3.793-3.794.924-.308 2.069-.308 4.359-.308h10.407l1.253-7.069c.505-2.862-1.435-5.632-4.297-6.137-2.862-.505-5.632,1.435-6.137,4.297l-.443,2.515c-.243,1.378-1.577,2.312-2.955,2.069-1.377-.243-2.311-1.577-2.068-2.955l.444-2.515zM85.279,47.77c0-17.408-15.61-31.52-34.866-31.52-19.257,0-34.867,14.112-34.867,31.52 0,8.297 3.547,15.846 9.345,21.475.22,3.494-1.85,7.765-4.443,10.652l-.059.075c-.373.538-.059,1.308.583,1.433 2.202.365 6.105-.3 8.45-1.453l.386-.185c1.22-.58 3.292-1.562 5.158-3.722 4.656,2.083 9.9,3.254 15.447,3.254 19.256,0 34.866-14.112 34.866-31.52z"/></g></g></g></g></svg>';

  var SVG_CHANNEL = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"><defs><clipPath id="chca"><rect width="512" height="512"/></clipPath><clipPath id="chcb"><path d="M0,0 L100,0 L100,100 L0,100z"/></clipPath></defs><g clip-path="url(#chca)"><g clip-path="url(#chcb)" transform="matrix(5.12,0,0,5.12,0,0)"><g><g><path stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#fff" stroke-width="6" d="M35.285,72.25h37.59c4.937,0 9-4.063 9-9v-32.875c0-4.937-4.063-9-9-9h-46c-4.937,0-9,4.062-9,9v51.458c0,2.662 3.21,4.005 5.106,2.136l11.602-11.462c.187-.185.439-.288.702-.288zM34.875,53.625h20.875M34.875,39.625h31.375"/></g></g></g></g></svg>';

  // ── Helper: Open Telegram link using WebApp API ──
  function openTelegramLink(url) {
    if (tg && tg.openTelegramLink) {
      // Use Telegram WebApp API method (keeps Mini App open in newer versions)
      tg.openTelegramLink(url);
    } else if (tg && tg.openLink) {
      // Fallback to openLink if available
      tg.openLink(url);
    } else {
      // Final fallback - browser new tab (should never happen in Telegram)
      window.open(url, '_blank');
    }
  }

  // ── State ──
  var WEBHOOK_URL = null;
  var CHANNELS_DATA = [];
  var isVerifying = false;
  var autoCloseTimer = null;

  // ── Parse ?check= param ──
  var urlParams = new URLSearchParams(location.search);
  var checkParam = urlParams.get('check');
  if (checkParam) WEBHOOK_URL = decodeURIComponent(checkParam);

  // ── Render continue button ──
  function renderContinueNormal() {
    var btn = document.getElementById('continue-btn');
    btn.innerHTML = '<span class="cont-icon">' + SVG_CONTINUE + '</span>Continue';
  }
  renderContinueNormal();

  // ── Check if all joined → unlock continue ──
  function checkAllJoined() {
    var btn = document.getElementById('continue-btn');
    if (CHANNELS_DATA.length > 0 && CHANNELS_DATA.every(function(ch) { return ch.joined; })) {
      btn.classList.remove('locked');
      // Auto close after 5 seconds if all channels are joined
      if (autoCloseTimer) clearTimeout(autoCloseTimer);
      autoCloseTimer = setTimeout(function() {
        if (tg && CHANNELS_DATA.every(function(ch) { return ch.joined; })) {
          showToast('success', 'All channels joined! Closing...');
          setTimeout(function() {
            if (tg) tg.close();
          }, 1000);
        }
      }, 5000);
    } else {
      btn.classList.add('locked');
      if (autoCloseTimer) {
        clearTimeout(autoCloseTimer);
        autoCloseTimer = null;
      }
    }
  }

  // ── Escape HTML ──
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Update all channel buttons to reflect current backend status ──
  function updateChannelButtons() {
    var rows = document.querySelectorAll('#channels-list .channel-row');
    
    CHANNELS_DATA.forEach(function(ch, idx) {
      var row = rows[idx];
      if (!row) return;
      
      var btnContainer = row.querySelector('.join-btn, .join-btn.done, a.join-btn');
      if (!btnContainer) return;
      
      var newBtnHtml;
      
      if (ch.joined) {
        // Already joined - show checkmark
        newBtnHtml = '<span class="join-btn done"><span class="status-icon">' + SVG_SUCCESS + '</span></span>';
      } else {
        // Not joined - show Join button with Telegram WebApp link opening
        newBtnHtml = '<a class="join-btn" href="#" data-channel-index="' + idx + '" onclick="return handleJoinClick(this, ' + idx + ', \'' + escHtml(ch.link) + '\')">Join</a>';
      }
      
      // Replace the button element
      var parent = btnContainer.parentNode;
      var tempDiv = document.createElement('div');
      tempDiv.innerHTML = newBtnHtml;
      var newBtn = tempDiv.firstChild;
      parent.replaceChild(newBtn, btnContainer);
    });
    
    checkAllJoined();
  }

  // ── Render channel list dynamically (initial load) ──
  function renderChannels(channels) {
    CHANNELS_DATA = channels;
    var list = document.getElementById('channels-list');
    list.innerHTML = '';

    channels.forEach(function(ch, i) {
      // Divider between rows
      if (i > 0) {
        var divider = document.createElement('div');
        divider.className = 'channel-divider';
        list.appendChild(divider);
      }

      var row = document.createElement('div');
      row.className = 'channel-row';

      var btnHtml;
      if (ch.joined) {
        btnHtml = '<span class="join-btn done"><span class="status-icon">' + SVG_SUCCESS + '</span></span>';
      } else {
        btnHtml = '<a class="join-btn" href="#" data-channel-index="' + i + '" onclick="return handleJoinClick(this, ' + i + ', \'' + escHtml(ch.link) + '\')">Join</a>';
      }

      row.innerHTML =
        '<div class="channel-left">' +
          '<div class="mini-icon-box">' + SVG_CHANNEL + '</div>' +
          '<div class="channel-name">' + escHtml(ch.name || ch.channel) + '</div>' +
        '</div>' +
        btnHtml;

      list.appendChild(row);
    });

    checkAllJoined();
  }

  // ── Handle join click with REAL backend verification using openTelegramLink ──
  function handleJoinClick(btn, idx, channelLink) {
    if (!btn || btn.classList.contains('done') || isVerifying) return false;
    
    // Mark as verifying to prevent multiple clicks
    isVerifying = true;
    
    // Store original button HTML for reset
    var originalHtml = 'Join';
    
    // Show loading state
    btn.classList.add('is-loading');
    btn.innerHTML = '<span class="join-load"><span class="join-spinner"></span>Opening...</span>';
    
    // Open the channel link using Telegram WebApp API (keeps Mini App open)
    openTelegramLink(channelLink);
    
    // Show toast instruction
    showToast('info', 'Please join the channel in Telegram, then wait...');
    
    // Wait 5 seconds for user to join, then verify with backend (increased from 4s for reliability)
    setTimeout(function() {
      // Update button to verification state
      btn.innerHTML = '<span class="join-load"><span class="join-spinner"></span>Verifying...</span>';
      
      // Call backend to check REAL membership status
      if (!WEBHOOK_URL) {
        // Fallback for dev mode
        btn.classList.remove('is-loading');
        btn.innerHTML = originalHtml;
        isVerifying = false;
        return false;
      }
      
      fetch(WEBHOOK_URL)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.channels && data.channels[idx]) {
            var isJoined = data.channels[idx].joined;
            
            if (isJoined) {
              // User actually joined - update UI
              btn.classList.remove('is-loading');
              btn.classList.add('done');
              btn.innerHTML = '<span class="status-icon">' + SVG_SUCCESS + '</span>';
              // Update local data
              CHANNELS_DATA[idx].joined = true;
              showToast('success', '✓ Joined successfully!');
              haptic('success');
              checkAllJoined();
            } else {
              // User didn't join - show error SVG on button
              btn.classList.remove('is-loading');
              btn.classList.remove('done');
              btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
              showToast('error', 'Please join the channel first, then try again');
              haptic('error');
              // Reset button after 2 seconds so user can try again
              setTimeout(function() {
                if (btn && !CHANNELS_DATA[idx].joined) {
                  btn.innerHTML = originalHtml;
                  btn.classList.remove('is-loading');
                }
              }, 2000);
            }
          } else {
            btn.classList.remove('is-loading');
            btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
            showToast('error', 'Verification failed, please try again');
            setTimeout(function() {
              if (btn && !CHANNELS_DATA[idx].joined) {
                btn.innerHTML = originalHtml;
                btn.classList.remove('is-loading');
              }
            }, 2000);
          }
          isVerifying = false;
        })
        .catch(function() {
          btn.classList.remove('is-loading');
          btn.innerHTML = '<span class="status-icon">' + SVG_ERROR + '</span>';
          showToast('error', 'Network error, please try again');
          haptic('error');
          setTimeout(function() {
            if (btn && !CHANNELS_DATA[idx].joined) {
              btn.innerHTML = originalHtml;
              btn.classList.remove('is-loading');
            }
          }, 2000);
          isVerifying = false;
        });
    }, 5000); // Increased wait time to give user enough time to join
    
    return false;
  }

  // ── Toast (no image/gif, only SVG) ──
  var toastTimer;
  function showToast(type, msg) {
    var el  = document.getElementById('toast');
    var ico = document.getElementById('toast-icon');
    var txt = document.getElementById('toast-msg');
    clearTimeout(toastTimer);
    el.classList.remove('show');
    
    // Handle info type (neutral color)
    if (type === 'info') {
      el.className = 'info';
      el.style.background = '#6c757d';
      ico.innerHTML = SVG_CONTINUE;
    } else {
      el.className = type;
      el.style.background = '';
      ico.innerHTML = type === 'success' ? SVG_SUCCESS : SVG_ERROR;
    }
    
    txt.textContent = msg;
    void el.offsetWidth;
    el.classList.add('show');
    if (type !== 'info') haptic(type);
    toastTimer = setTimeout(function(){ 
      el.classList.remove('show');
      if (type === 'info') el.style.background = '';
    }, 2800);
  }

  // ── Continue — real webhook verification (final check) ──
  function continueBot(btn) {
    if (!btn || btn.classList.contains('is-loading') || btn.classList.contains('locked')) return false;
    if (!WEBHOOK_URL) return false;

    btn.classList.add('is-loading');
    btn.innerHTML = '<span class="cont-spinner"></span>Verifying';

    fetch(WEBHOOK_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.joined) {
          btn.innerHTML = '<span class="cont-spinner"></span>Continuing';
          setTimeout(function() {
            if (tg) tg.close();
          }, 600);
        } else {
          // Update ALL channels with REAL backend status
          if (data.channels) {
            CHANNELS_DATA = data.channels;
            updateChannelButtons();
          }
          btn.classList.remove('is-loading');
          renderContinueNormal();
          showToast('error', 'Please join all channels first');
          haptic('error');
        }
      })
      .catch(function() {
        btn.classList.remove('is-loading');
        renderContinueNormal();
        showToast('error', 'Network error, try again');
        haptic('error');
      });

    return false;
  }

  // ── Load channels on startup ──
  function loadChannels() {
    if (!WEBHOOK_URL) {
      // Dev mode fallback — no ?check= param
      renderChannels([
        { channel: '@Example', name: 'Example Channel', link: 'https://t.me/example', joined: false }
      ]);
      return;
    }

    fetch(WEBHOOK_URL)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        renderChannels(data.channels);
        // If all channels already joined from the start, auto close after 5 seconds
        if (data.joined) {
          showToast('success', 'All channels verified!');
          setTimeout(function() {
            if (tg) tg.close();
          }, 5000);
        }
      })
      .catch(function() {
        document.getElementById('channels-list').innerHTML =
          '<div style="padding:16px 0;text-align:center;color:rgba(127,127,127,.8);font-size:14px;">Failed to load channels.<br>Please close and try again.</div>';
        showToast('error', 'Failed to load channels');
      });
  }

  // Add CSS for info toast
  var style = document.createElement('style');
  style.textContent = '#toast.info { background: #6c757d; }';
  document.head.appendChild(style);

  loadChannels();

  document.body.classList.remove('no_transition');
</script>
