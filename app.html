<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Join Verification</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #0b1020);
      --text: var(--tg-theme-text-color, #eff6ff);
      --hint: var(--tg-theme-hint-color, #9db0cd);
      --button: var(--tg-theme-button-color, #2563eb);
      --button-text: var(--tg-theme-button-text-color, #fff);
      --card: rgba(15, 23, 42, 0.75);
      --border: rgba(148, 163, 184, 0.2);
      --ok: #22c55e;
      --warn: #f59e0b;
      --err: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(1000px 550px at -10% -10%, rgba(37, 99, 235, 0.2), transparent 65%),
        radial-gradient(900px 500px at 110% -10%, rgba(16, 185, 129, 0.12), transparent 60%),
        var(--bg);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      padding: max(14px, env(safe-area-inset-top)) 14px max(14px, env(safe-area-inset-bottom));
    }

    .container { max-width: 520px; margin: 0 auto; display: grid; gap: 14px; }

    .hero,
    .panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.35);
    }

    .hero { padding: 18px; }
    .chip {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      color: #bfdbfe;
      background: rgba(59, 130, 246, 0.2);
    }

    h1 { margin: 12px 0 6px; font-size: 24px; }
    #subtitle { margin: 0; line-height: 1.5; font-size: 14px; color: var(--hint); }

    #status {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px 14px;
      font-size: 13px;
      color: var(--hint);
    }
    #status.ok { border-left: 3px solid var(--ok); color: #bbf7d0; }
    #status.warn { border-left: 3px solid var(--warn); color: #fde68a; }
    #status.error { border-left: 3px solid var(--err); color: #fecaca; }

    #channels {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .row {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .name {
      font-size: 15px;
      font-weight: 700;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      width: fit-content;
      margin-top: 4px;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge.ok { background: #86efac; color: #052e16; }
    .badge.warn { background: #fcd34d; color: #78350f; }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      color: var(--button-text);
      background: linear-gradient(135deg, var(--button), #1d4ed8);
    }

    .btn.secondary {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--text);
    }

    .hint {
      font-size: 12px;
      color: var(--hint);
      line-height: 1.45;
      padding: 0 14px 14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="hero">
      <span class="chip">🔐 Membership Gate</span>
      <h1>Join all required channels</h1>
      <p id="subtitle">We'll verify your memberships through your Bot Business webhook.</p>
    </section>

    <section class="panel">
      <div id="status" class="warn">Initializing mini app…</div>
      <div id="channels"></div>
      <p class="hint">If you already joined everything, tap <b>Re-check</b>. The app auto-closes after successful verification.</p>
    </section>

    <button id="recheck" class="btn">Re-check</button>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;
    const statusEl = document.getElementById('status');
    const subtitleEl = document.getElementById('subtitle');
    const channelsEl = document.getElementById('channels');
    const recheckBtn = document.getElementById('recheck');

    const query = new URLSearchParams(window.location.search);
    const checkEndpoint = query.get('check');

    function setStatus(type, message) {
      statusEl.className = type;
      statusEl.textContent = message;
    }

    function isValidWebhookUrl(url) {
      if (!url) return false;
      try {
        const parsed = new URL(url);
        return parsed.protocol === 'https:';
      } catch {
        return false;
      }
    }

    function renderChannels(channels) {
      channelsEl.innerHTML = '';

      channels.forEach((item) => {
        const row = document.createElement('article');
        row.className = 'row';

        const left = document.createElement('div');
        const badgeClass = item.joined ? 'ok' : 'warn';
        const badgeText = item.joined ? 'Joined' : 'Not joined';

        left.innerHTML = `
          <div class="name">${item.channel || item.id || 'Channel'}</div>
          <span class="badge ${badgeClass}">${badgeText}</span>
        `;

        const right = document.createElement('div');
        if (!item.joined && item.link) {
          const joinBtn = document.createElement('button');
          joinBtn.className = 'btn secondary';
          joinBtn.textContent = 'Join';
          joinBtn.onclick = () => tg?.openTelegramLink(item.link);
          right.appendChild(joinBtn);
        }

        row.append(left, right);
        channelsEl.appendChild(row);
      });
    }

    async function checkMembership() {
      if (!isValidWebhookUrl(checkEndpoint)) {
        setStatus('error', 'Invalid or missing `check` webhook URL.');
        subtitleEl.textContent = 'Open this app from /start button generated by Bot Business.';
        return;
      }

      try {
        setStatus('warn', 'Checking your memberships…');
        subtitleEl.textContent = 'Please wait while we ask your webhook.';
        recheckBtn.disabled = true;

        const url = new URL(checkEndpoint);
        url.searchParams.set('_', Date.now().toString());

        const response = await fetch(url.toString(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData: tg?.initData || null,
            platform: tg?.platform || null
          })
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          throw new Error(data.error || 'Webhook returned an invalid response.');
        }

        renderChannels(data.channels || []);

        if (data.joined) {
          setStatus('ok', '✅ Verification completed. Closing mini app…');
          subtitleEl.textContent = 'All channels joined. Returning to bot.';
          tg?.HapticFeedback?.notificationOccurred('success');
          tg?.MainButton?.setText('Verified ✅');
          tg?.MainButton?.show();
          tg?.MainButton?.disable();
          setTimeout(() => tg?.close(), 1600);
          return;
        }

        setStatus('warn', 'Please join missing channels and tap Re-check.');
        subtitleEl.textContent = 'After joining channels, come back and verify again.';
        tg?.MainButton?.setText('Re-check');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } catch (error) {
        setStatus('error', `❌ ${error.message}`);
        subtitleEl.textContent = 'Check BB webhook command and WebApp.render JSON output.';
        tg?.MainButton?.setText('Retry');
        tg?.MainButton?.show();
        tg?.MainButton?.enable();
      } finally {
        recheckBtn.disabled = false;
      }
    }

    function init() {
      if (!tg) {
        setStatus('error', 'Telegram WebApp SDK not available.');
        subtitleEl.textContent = 'Open this page from Telegram bot /start button.';
        recheckBtn.onclick = () => location.reload();
        return;
      }

      tg.ready();
      tg.expand();
      tg.MainButton?.onClick(checkMembership);
      recheckBtn.onclick = checkMembership;
      checkMembership();
    }

    init();
  </script>
</body>
</html>
