    <script src="//telegram.org/js/tgwallpaper.min.js?3"></script>
    <script type="text/javascript">
      // Initialize Telegram WebApp SDK
      const webApp = window.Telegram.WebApp;
      webApp.ready();
      webApp.expand();

      [span_1](start_span)// Original Wallpaper Animation[span_1](end_span)
      var tme_bg = document.getElementById('tgme_background');
      if (tme_bg) {
        TWallpaper.init(tme_bg);
        TWallpaper.animate(true);
        window.onfocus = function(){ TWallpaper.update(); };
      }
      document.body.classList.remove('no_transition');

      // Membership Verification Logic
      function verifyJoin(channelId) {
        webApp.HapticFeedback.impactOccurred('medium');
        // Add your bot API call here to check membership
        webApp.showAlert("Verifying Channel " + channelId + "...");
      }

      [span_2](start_span)// Sync theme with Telegram System[span_2](end_span)
      function toggleTheme(dark) {
        document.documentElement.classList.toggle('theme_dark', dark);
      }
      if (window.matchMedia) {
        var darkMedia = window.matchMedia('(prefers-color-scheme: dark)');
        toggleTheme(darkMedia.matches);
        darkMedia.addListener(function(e) { toggleTheme(e.matches); });
      }
    </script>
